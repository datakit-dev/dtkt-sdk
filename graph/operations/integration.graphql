fragment IntegrationFragment on Integration {
  id
  slug
  name
  apiVersion
  version
  description
  icon
  visibility
  organizationSlug
  organizationID
  revisionID
  createdAt
  updatedAt
  published {
    ...IntegrationRevisionFragment
  }
}

fragment IntegrationRevisionFragment on IntegrationRevision {
  id
  slug
  integrationSlug
  organizationSlug
  specEtag
  sourceURI
  sourceEtag
  integrationID
  authorID
  createdAt
  updatedAt
}

query GetIntegration($id: ID, $slug: String) {
  integration(id: $id, slug: $slug) {
    ...IntegrationFragment
  }
}

query ListIntegrations(
  $orderBy: IntegrationOrder
  $where: IntegrationWhereInput
) {
  integrations(orderBy: $orderBy, where: $where) {
    edges {
      node {
        ...IntegrationFragment
      }
    }
    totalCount
  }
}
