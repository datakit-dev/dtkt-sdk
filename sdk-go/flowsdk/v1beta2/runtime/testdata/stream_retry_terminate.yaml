apiVersion: v1beta2
kind: Flow
spec:
  name: stream_retry_terminate
  description: >-
    Stream calls error.StreamInternal (code 13); retry_strategy.terminate_when
    matches and surfaces a *TerminateError (a distinct type from operator
    ErrTerminated). Guards the terminate branch on a streaming RPC: matched
    errors are escalated to flow-wide cancellation as TerminateError, not
    retried.
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        terminate_when: "= this.error.code == 13"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamInternal
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.echo.value"
