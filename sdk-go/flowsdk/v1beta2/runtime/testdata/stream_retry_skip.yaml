apiVersion: v1beta2
kind: Flow
spec:
  name: stream_retry_skip
  description: >-
    Stream calls error.StreamNotFound (code 5); retry_strategy.skip_when
    matches and skips the failing iteration, producing no output for it. Guards
    the skip branch on a streaming RPC: the error is consumed and downstream
    sees a gap rather than a failure.
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        skip_when: "= this.error.code == 5"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamNotFound
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.echo.value"
