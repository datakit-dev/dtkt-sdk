apiVersion: v1beta2
kind: Flow
spec:
  name: interaction_ticker_only_repro
  description: >-
    Bisection fixture between interaction_var_repro (passes) and
    interaction_ticker_var_repro (used to hang). Removes the
    var-on-interaction-deps so the interaction's only upstream is the ticker;
    the test asserts the multi-iteration ticker-driven interaction loop
    completes cleanly. Used to isolate whether a ticker-only or (ticker, var)
    topology was the source of an earlier multi-iteration hang.
  inputs:
    - id: maxIters
      uint64:
        default: 5
      cache: true
  generators:
    - id: tick
      ticker:
        interval: 0.05s
  vars:
    - id: stopGate
      value: "= 0"
      flow_control:
        stop_when: "= generators.tick.eval_count >= int(inputs.maxIters.value)"
  interactions:
    - id: confirmDiscard
      inputs:
        - id: discard
          title: |
            = "tick=" + string(generators.tick.value) + ". Discard?"
          confirm: {}
  outputs:
    - id: tick
      value: |
        = {
            "value": generators.tick.eval_count,
            "discard": interactions.confirmDiscard.value.discard.value
          }
      transforms:
        - filter: "= !this.value.discard"
        - map: "= this.value.value"
