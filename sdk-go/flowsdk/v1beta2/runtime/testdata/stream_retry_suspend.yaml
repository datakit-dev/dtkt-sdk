apiVersion: v1beta2
kind: Flow
spec:
  name: stream_retry_suspend
  description: >-
    Stream calls error.StreamPermissionDenied (code 7);
    retry_strategy.suspend_when matches and parks the stream node until
    external Resume. Guards the suspend branch on streams: matched errors lead
    to a clean suspend (not a retry loop or terminate).
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamPermissionDenied
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.echo.value"
