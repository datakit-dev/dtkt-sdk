apiVersion: v1beta2
kind: Flow
spec:
  name: lint_schema_cel_in_field
  connections:
    - id: myconn
      services:
        - test.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: test.Service.Do
        request:
          name: "= inputs.x.value"
          count: "= size(inputs.x.value)"
          tags:
            - "= inputs.x.value"
  outputs:
    - id: result
      value: "= actions.run.value"
