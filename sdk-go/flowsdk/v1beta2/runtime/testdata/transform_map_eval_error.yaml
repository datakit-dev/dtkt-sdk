apiVersion: v1beta2
kind: Flow
spec:
  name: transform_map_eval_error
  description: >-
    Var transform's map expression divides by zero (`= this.value / 0`). CEL
    lint passes (syntax is valid) but eval fails at runtime for every input.
    The flow surfaces an evaluation error rather than crashing. Guards that
    runtime CEL errors during a transform stage are caught and reported, not
    panicked.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: bad
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value / 0"
  outputs:
    - id: result
      value: "= vars.bad.value"
