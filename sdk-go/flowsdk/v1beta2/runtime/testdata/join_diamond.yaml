apiVersion: v1beta2
kind: Flow
spec:
  name: join_diamond
  description: >-
    Diamond topology: one input feeds two vars (left *2, right *3) that join at
    a single output computing left+right. Guards that fan-out followed by a
    join recombines values from both branches per input event, producing one
    output per upstream emission rather than two separate streams.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: left
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * 2"
    - id: right
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * 3"
  outputs:
    - id: combined
      value: "= vars.left.value + vars.right.value"
