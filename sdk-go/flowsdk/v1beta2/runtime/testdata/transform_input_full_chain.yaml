apiVersion: v1beta2
kind: Flow
spec:
  name: transform_input_full_chain
  description: >-
    Transforms declared on an input (not a var/output): map +1, filter evens,
    scan running sum. Feeding 1..5: post-map [2, 3, 4, 5, 6], post-filter [2,
    4, 6], scan emits [2, 6, 12]. Guards that the same transform pipeline that
    works on var/output also works on an input declaration.
  inputs:
    - id: x
      int64: {}
      transforms:
        - map: "= this.value + 1"
        - filter: "= this.value % 2 == 0"
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= inputs.x.value"
