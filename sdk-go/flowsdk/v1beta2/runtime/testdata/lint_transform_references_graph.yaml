apiVersion: v1beta2
kind: Flow
spec:
  name: lint_transform_references_graph
  description: >-
    Output's transform `filter` references `interactions.confirmDiscard.value`,
    a graph-node reference inside a transform stage. Transforms may only
    reference `this` (the value flowing through the pipeline); graph-aware
    reads belong in the producer's main expression. Lint must report
    CodeInvalidCEL on `transforms[0].filter` mentioning `may only reference
    this` and the offending node. Idiomatic working pattern is in
    interaction_output_filter_idiomatic.yaml.
  inputs:
    - id: x
      int64: {}
  interactions:
    - id: confirmDiscard
      inputs:
        - id: discard
          title: "Discard?"
          confirm: {}
  outputs:
    - id: result
      value: "= inputs.x.value"
      transforms:
        - filter: "= !interactions.confirmDiscard.value"
