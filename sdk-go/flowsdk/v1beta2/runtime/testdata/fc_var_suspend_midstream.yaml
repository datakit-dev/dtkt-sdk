apiVersion: v1beta2
kind: Flow
spec:
  name: fc_var_suspend_midstream
  description: >-
    Range generator emits 1..10 paced at 1ms intervals; var doubles each value
    with suspend_when triggered when the generator's value reaches 3. The test
    asserts that suspend pauses the flow mid-stream (more values queued behind
    the trigger), then resumes and drains the rest. Guards that suspend works
    in the middle of an active stream rather than only at the leading edge.
  generators:
    - id: seq
      range:
        start: 1
        end: 10
        step: 1
        rate:
          count: 1
          interval: "0.001s"
  vars:
    - id: doubled
      value: "= generators.seq.value * 2"
      flow_control:
        suspend_when: "= generators.seq.value == 3"
  outputs:
    - id: result
      value: "= vars.doubled.value"
