apiVersion: v1beta2
kind: Flow
spec:
  name: output_map
  description: >-
    Output applies a map transform on the output node (`= this.value * 10`).
    Feeding 1..3 yields [10, 20, 30]. Guards that output-level map transforms
    apply per-emit at the output stage.
  inputs:
    - id: x
      int64: {}
  outputs:
    - id: result
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * 10"
