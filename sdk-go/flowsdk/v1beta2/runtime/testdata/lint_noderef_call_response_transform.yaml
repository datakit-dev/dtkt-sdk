apiVersion: v1beta2
kind: Flow
spec:
  name: lint_noderef_call_response_transform
  description: >-
    Action declares an explicit identity `call.response: = this.response`;
    downstream output reads `actions.run.value.bogus_field`. Even though
    `call.response` is set, the response type is still md.Output() (the
    identity transform preserves shape), and walker must continue to flag the
    bogus field. Guards the responseExprTypeInfo path: compile call.response,
    read OutputType, look up descriptor.
  connections:
    - id: myconn
      services:
        - test.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: test.Service.Do
        request:
          name: "= inputs.x.value"
        response: "= this.response"
  outputs:
    - id: bad
      value: "= actions.run.value.bogus_field"
