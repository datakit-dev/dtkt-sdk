apiVersion: v1beta2
kind: Flow
spec:
  name: retry_before_fc_stream
  description: >-
    Stream calls error.StreamPermissionDenied (gRPC code 7);
    retry_strategy.suspend_when fires (intent: SUSPEND); FC.terminate_when=true
    promotes to flow-wide TERMINATE. Execute returns ErrTerminated; flow
    terminal state is PHASE_CANCELLED. Stream-side counterpart to
    retry_before_fc_action.
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamPermissionDenied
        request: "= inputs.msg.value"
      flow_control:
        terminate_when: "= true"
  outputs:
    - id: result
      value: "= streams.echo.value"
