apiVersion: v1beta2
kind: Flow
spec:
  name: stream_filter_transform
  description: >-
    Stream echoes input; downstream var applies a filter (value > 3) so only
    values above the threshold reach the output. Guards filter semantics on
    stream-sourced vars: dropped values do not advance downstream, but the
    stream itself is uninterrupted.
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: filtered
      value: "= streams.echo.value"
      transforms:
        - filter: "= this.value > 3"
  outputs:
    - id: result
      value: "= vars.filtered.value"
