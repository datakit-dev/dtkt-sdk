apiVersion: v1beta2
kind: Flow
spec:
  name: transform_flatten_passthrough
  description: >-
    Var transform is `flatten: false` -- an explicit no-op. Feeding 1..3 yields
    [1, 2, 3] unchanged. Guards that flatten:false is a true passthrough (not
    the same as the absence of a flatten directive) and that emit ordering
    matches input ordering.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: noop
      value: "= inputs.x.value"
      transforms:
        - flatten: false
  outputs:
    - id: result
      value: "= vars.noop.value"
