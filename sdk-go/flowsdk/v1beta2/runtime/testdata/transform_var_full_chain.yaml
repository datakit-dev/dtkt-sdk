apiVersion: v1beta2
kind: Flow
spec:
  name: transform_var_full_chain
  description: >-
    Var transform chain combining all four kinds: filter > 1, map x -> [x,
    x*2], flatten, scan running sum. Feeding 1..3: filter keeps [2, 3], map ->
    [[2,4], [3,6]], flatten -> [2, 4, 3, 6], scan emits [2, 6, 9, 15]. Guards
    4-stage transform composition on a single var.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: chain
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 1"
        - map: "= [this.value, this.value * 2]"
        - flatten: true
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.chain.value"
