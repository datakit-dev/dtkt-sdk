apiVersion: v1beta2
kind: Flow
spec:
  name: transform_var_full_chain
  description: "Var with filter, map, flatten, scan pipeline"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: chain
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 1"
        - map: "= [this.value, this.value * 2]"
        - flatten: true
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.chain.value"
