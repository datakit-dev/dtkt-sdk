apiVersion: v1beta2
kind: Flow
spec:
  name: nc_suspend_reentry
  description: "NC.suspend_when always-true on a Var; re-fires after each ResumeNode"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: doubled
      value: "= inputs.x.value * 2"
      node_control:
        suspend_when: "= true"
  outputs:
    - id: result
      value: "= vars.doubled.value"
