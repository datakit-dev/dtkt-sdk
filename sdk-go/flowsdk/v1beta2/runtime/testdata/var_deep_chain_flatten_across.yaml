apiVersion: v1beta2
kind: Flow
spec:
  name: var_deep_chain_flatten_across
  description: >-
    Two-var chain: `expand` maps each x to [x, x*10]; `flat` flattens then
    filters >= 10. Feeding 1, 2: expand emits [[1,10], [2,20]], flat -> [10,
    20] (after flatten+filter drops 1, 2). Guards flatten across a var
    boundary -- flattening lives downstream of the list-producing map.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: expand
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value * 10]"
    - id: flat
      value: "= vars.expand.value"
      transforms:
        - flatten: true
        - filter: "= this.value >= 10"
  outputs:
    - id: result
      value: "= vars.flat.value"
