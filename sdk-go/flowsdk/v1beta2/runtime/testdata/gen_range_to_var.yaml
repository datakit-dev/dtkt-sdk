apiVersion: v1beta2
kind: Flow
spec:
  name: gen_range_to_var
  generators:
    - id: seq
      range:
        start: 1
        end: 5
        step: 1
  vars:
    - id: doubled
      value: "= generators.seq.value"
      transforms:
        - map: "= this.value * 2"
  outputs:
    - id: result
      value: "= vars.doubled.value"
