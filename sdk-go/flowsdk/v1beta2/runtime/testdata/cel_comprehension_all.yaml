apiVersion: v1beta2
kind: Flow
spec:
  name: cel_comprehension_all
  description: >-
    Input value carries a struct with an `items` list of objects with field
    `n`. Output uses CEL's `all()` comprehension to check every item's n > 0.
    Feeding two inputs (one with all positive, one with a negative) yields true
    then false. Guards that comprehension macros work over list-of-struct
    values flowing through inputs, with each iteration variable seeing the
    struct's fields by name.
  inputs:
    - id: x
      string: {}
  outputs:
    - id: result
      value: "= inputs.x.value.items.all(i, i.n > 0)"
