apiVersion: v1beta2
kind: Flow
spec:
  name: nc_interaction_stop
  description: >-
    Interaction node fires once (when=true), then node_control.stop_when=true
    halts the interaction handler. Feeding 1, 2 with a responder that returns
    100 yields 1 or 2 results, all equal to 100 (the response value). Flow
    returns nil. Guards that node_control.stop_when on an interaction halts the
    prompt loop gracefully.
  inputs:
    - id: x
      int64: {}
  interactions:
    - id: confirm
      when: "= inputs.x.value > 0"
      node_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= interactions.confirm.value"
