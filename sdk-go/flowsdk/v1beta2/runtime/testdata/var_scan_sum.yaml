apiVersion: v1beta2
kind: Flow
spec:
  name: var_scan_sum
  description: >-
    Single-var scan (initial 0, accumulator = accumulator + value) emits
    running sum. Feeding 1..3 yields [1, 3, 6]. Guards scan semantics on a
    var: one emit per input carrying the accumulated total.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: sum
      value: "= inputs.x.value"
      transforms:
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.sum.value"
