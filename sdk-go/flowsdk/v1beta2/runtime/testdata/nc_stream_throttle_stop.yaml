apiVersion: v1beta2
kind: Flow
spec:
  name: nc_stream_throttle_stop
  description: "NC.stop_when on a throttled Stream; verifies throttle wait honors stopCh"
  inputs:
    - id: msg
      string: {}
  streams:
    - id: echo
      throttle:
        count: 1
        interval: "1s"
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
      node_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= streams.echo.value"
