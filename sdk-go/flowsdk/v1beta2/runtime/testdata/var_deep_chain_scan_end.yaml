apiVersion: v1beta2
kind: Flow
spec:
  name: var_deep_chain_scan_end
  description: >-
    Three-var chain: `filtered` filters > 2, `doubled` maps *2, `total` scans
    running sum. Feeding 1..5: filtered keeps [3, 4, 5], doubled [6, 8, 10],
    total emits [6, 14, 24]. Guards scan as the terminal stage of a multi-var
    chain: scan's state is per-var (independent), and each emit advances
    accumulator.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: filtered
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 2"
    - id: doubled
      value: "= vars.filtered.value"
      transforms:
        - map: "= this.value * 2"
    - id: total
      value: "= vars.doubled.value"
      transforms:
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.total.value"
