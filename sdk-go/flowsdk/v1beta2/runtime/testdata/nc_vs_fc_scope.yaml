apiVersion: v1beta2
kind: Flow
spec:
  name: nc_vs_fc_scope
  inputs:
    - id: x
      int64: {}
  vars:
    - id: doubled
      value: "= inputs.x.value * 2"
      node_control:
        terminate_when: "= inputs.x.value >= 3"
    - id: tripled
      value: "= inputs.x.value * 3"
  outputs:
    - id: doubled_out
      value: "= vars.doubled.value"
    - id: tripled_out
      value: "= vars.tripled.value"
