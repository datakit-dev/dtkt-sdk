apiVersion: v1beta2
kind: Flow
spec:
  name: nc_vs_fc_scope
  description: >-
    Two parallel branches share one input: `doubled` has
    node_control.terminate_when at x>=3; `tripled` is unaffected. Feeding 1..5:
    `doubled_out` is a prefix of [2, 4, 6, 8, 10] (NC cancels its node
    mid-stream), `tripled_out` is the full [3, 6, 9, 12, 15]. Guards NC scope:
    terminating one node must NOT affect a sibling branch.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: doubled
      value: "= inputs.x.value * 2"
      node_control:
        terminate_when: "= inputs.x.value >= 3"
    - id: tripled
      value: "= inputs.x.value * 3"
  outputs:
    - id: doubled_out
      value: "= vars.doubled.value"
    - id: tripled_out
      value: "= vars.tripled.value"
