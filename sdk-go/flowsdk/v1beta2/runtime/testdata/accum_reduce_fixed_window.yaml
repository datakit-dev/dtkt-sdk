apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_fixed_window
  generators:
    - id: seq
      range:
        start: 1
        end: 3
        step: 1
  vars:
    - id: windowed
      value: "= generators.seq.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
            group_by:
              window:
                fixed:
                  length: "1s"
  outputs:
    - id: result
      value: "= vars.windowed.value"
