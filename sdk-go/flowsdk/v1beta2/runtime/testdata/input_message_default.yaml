apiVersion: v1beta2
kind: Flow
spec:
  name: input_message_default
  description: "Message-typed input with a default Struct; no value fed"
  inputs:
    - id: payload
      message:
        type: google.protobuf.Struct
        default:
          name: "fallback"
          age: 1
  generators:
    - id: tick
      ticker:
        interval: "0.05s"
  outputs:
    - id: result
      value: "= inputs.payload.value"
      flow_control:
        stop_when: "= int(generators.tick.eval_count) >= 1"
