apiVersion: v1beta2
kind: Flow
spec:
  name: transform_string_filter
  description: >-
    Var filter on string input using CEL's `size()` (`size(this.value) > 3`).
    Feeding ["hi", "hello", "yo", "world"]: "hi" (2) and "yo" (2) drop;
    "hello" (5) and "world" (5) pass. Guards filter semantics on string-typed
    values with size-based predicates.
  inputs:
    - id: name
      string: {}
  vars:
    - id: long
      value: "= inputs.name.value"
      transforms:
        - filter: "= size(this.value) > 3"
  outputs:
    - id: result
      value: "= vars.long.value"
