apiVersion: v1beta2
kind: Flow
spec:
  name: fanout_wide
  description: "Single input to many outputs"
  inputs:
    - id: x
      int64: {}
  outputs:
    - id: identity
      value: "= inputs.x.value"
    - id: doubled
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * 2"
    - id: squared
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * this.value"
    - id: negated
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * -1"
