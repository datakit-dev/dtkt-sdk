apiVersion: v1beta2
kind: Flow
spec:
  name: stream_map_transform
  description: >-
    Stream echoes input; downstream var applies a map transform (value * 10).
    Guards that var transforms apply per stream emission (not per input) when
    fed by a streams.X.value source.
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
  vars:
    - id: mapped
      value: "= streams.echo.value"
      transforms:
        - map: "= this.value * 10"
  outputs:
    - id: result
      value: "= vars.mapped.value"
