apiVersion: v1beta2
kind: Flow
spec:
  name: stream_map_transform
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
  vars:
    - id: mapped
      value: "= streams.echo.value"
      transforms:
        - map: "= this.value * 10"
  outputs:
    - id: result
      value: "= vars.mapped.value"
