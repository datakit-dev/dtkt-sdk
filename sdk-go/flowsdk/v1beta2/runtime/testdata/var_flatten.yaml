apiVersion: v1beta2
kind: Flow
spec:
  name: var_flatten
  description: >-
    Single-var transform: map x -> [x, x+1] then flatten. Feeding 10, 20: map
    -> [[10,11], [20,21]], flatten -> [10, 11, 20, 21]. Guards the simplest
    map-then-flatten fan-out -- N inputs produce 2N emits.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: flat
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value + 1]"
        - flatten: true
  outputs:
    - id: result
      value: "= vars.flat.value"
