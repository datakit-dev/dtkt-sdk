apiVersion: v1beta2
kind: Flow
spec:
  name: var_flatten
  description: "Var with map-to-list then flatten transform"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: flat
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value + 1]"
        - flatten: true
  outputs:
    - id: result
      value: "= vars.flat.value"
