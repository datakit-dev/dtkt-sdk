apiVersion: v1beta2
kind: Flow
spec:
  name: transform_string_map
  description: "String map appending exclamation mark"
  inputs:
    - id: name
      string: {}
  vars:
    - id: upper
      value: "= inputs.name.value"
      transforms:
        - map: '= this.value + "!"'
  outputs:
    - id: result
      value: "= vars.upper.value"
