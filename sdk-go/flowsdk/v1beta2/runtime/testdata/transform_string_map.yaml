apiVersion: v1beta2
kind: Flow
spec:
  name: transform_string_map
  description: >-
    Var transform on string input: map appends `!` (`= this.value + "!"`).
    Feeding ["hello", "world"] yields ["hello!", "world!"]. Guards CEL string
    concatenation in a map transform on a string-typed var.
  inputs:
    - id: name
      string: {}
  vars:
    - id: upper
      value: "= inputs.name.value"
      transforms:
        - map: '= this.value + "!"'
  outputs:
    - id: result
      value: "= vars.upper.value"
