apiVersion: v1beta2
kind: Flow
spec:
  name: retry_before_nc_stream
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamPermissionDenied
        request: "= inputs.msg.value"
      node_control:
        terminate_when: "= true"
  outputs:
    - id: result
      value: "= streams.echo.value"
