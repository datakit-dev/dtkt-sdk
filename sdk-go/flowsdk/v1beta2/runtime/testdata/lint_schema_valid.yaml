apiVersion: v1beta2
kind: Flow
spec:
  name: lint_schema_valid
  description: >-
    Action's request literal sets every well-typed field on test.TestRequest:
    string `name`, int `count`, bool `active`, repeated string `tags`, and a
    nested TestNested submessage. With a resolver providing the descriptor,
    lint must produce zero diagnostics. Guards the full schema-validation happy
    path.
  connections:
    - id: myconn
      services:
        - test.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: test.Service.Do
        request:
          name: "= inputs.x.value"
          count: 42
          active: true
          tags:
            - one
            - two
          nested:
            value: nested_val
  outputs:
    - id: result
      value: "= actions.run.value"
