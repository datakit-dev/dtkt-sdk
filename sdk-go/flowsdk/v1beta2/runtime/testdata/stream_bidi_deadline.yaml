apiVersion: v1beta2
kind: Flow
spec:
  name: stream_bidi_deadline
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: bidi
      call:
        connection: echo
        method: error.BidiDeadline
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.bidi.value"
