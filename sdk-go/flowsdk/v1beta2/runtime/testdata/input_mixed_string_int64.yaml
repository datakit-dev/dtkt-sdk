apiVersion: v1beta2
kind: Flow
spec:
  name: mixed_string_int64_inputs
  description: "Two inputs of different types (string and int64) to separate outputs"
  inputs:
    - id: name
      string: {}
    - id: count
      int64: {}
  outputs:
    - id: name
      value: "= inputs.name.value"
    - id: count
      value: "= inputs.count.value"
