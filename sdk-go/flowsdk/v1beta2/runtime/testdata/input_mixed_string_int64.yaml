apiVersion: v1beta2
kind: Flow
spec:
  name: mixed_string_int64_inputs
  description: >-
    Two inputs of different scalar types (string name, int64 count) each
    feeding its own output. Feeding name='alice' and count=5 yields 'alice' on
    outputs.name and 5 on outputs.count. Guards that heterogeneous-typed inputs
    flow through to their respective outputs without typing collisions.
  inputs:
    - id: name
      string: {}
    - id: count
      int64: {}
  outputs:
    - id: name
      value: "= inputs.name.value"
    - id: count
      value: "= inputs.count.value"
