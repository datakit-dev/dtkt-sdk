apiVersion: v1beta2
kind: Flow
spec:
  name: nc_output_transforms_stop
  description: >-
    Output carries a filter (evens) + map (*10) transform pipeline and
    node_control.stop_when=inputs.x.value>=5. Mirrors nc_var_transforms_stop
    for the Output handler, exposing Gap 2:
    outputHandler.runWithTransforms (output.go:131) doesn't call
    checkLifecycle, so NC.stop_when may never fire on the transforms code
    path even when the predicate holds. Feeding 2, 4, 5, 6, 8: filter keeps
    [2, 4, 6, 8], map yields [20, 40, 60, 80]. NC stops when input 6
    lands (first post-filter trigger). Stop-fired bound is len < 4 (full
    drain).
  inputs:
    - id: x
      int64: {}
  outputs:
    - id: result
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 10"
      node_control:
        stop_when: "= inputs.x.value >= 5"
