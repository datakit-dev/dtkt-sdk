apiVersion: v1beta2
kind: Flow
spec:
  name: var_map_x2
  description: "Var with map transform doubling each value"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: doubled
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value * 2"
  outputs:
    - id: result
      value: "= vars.doubled.value"
