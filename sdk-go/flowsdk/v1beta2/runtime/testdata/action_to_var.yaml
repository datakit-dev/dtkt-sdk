apiVersion: v1beta2
kind: Flow
spec:
  name: action_to_var
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: tripled
      value: "= actions.echo.value"
      transforms:
        - map: "= this.value * 3"
  outputs:
    - id: result
      value: "= vars.tripled.value"
