apiVersion: v1beta2
kind: Flow
spec:
  name: stream_client_invalid
  description: >-
    Client-streaming RPC error.ClientStreamInvalid returns InvalidArgument
    (code 3) after some sends are accepted -- a mid-stream rejection. Guards
    that the client-stream handler unwinds correctly when the server rejects
    after accepting prior chunks (no hang waiting for a non-arriving final
    response).
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: collect
      call:
        connection: log
        method: error.ClientStreamInvalid
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.collect.value"
