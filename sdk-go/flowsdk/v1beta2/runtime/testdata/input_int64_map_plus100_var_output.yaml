apiVersion: v1beta2
kind: Flow
spec:
  name: input_int64_map_plus100_var_output
  description: >-
    Int64 input with a +100 map transform feeds a passthrough var, which feeds
    the output. Feeding 1, 2 yields [101, 102]. Guards that input-level
    transforms apply BEFORE the var sees the value (rather than the var seeing
    the raw input).
  inputs:
    - id: x
      int64: {}
      transforms:
        - map: "= this.value + 100"
  vars:
    - id: pass
      value: "= inputs.x.value"
  outputs:
    - id: result
      value: "= vars.pass.value"
