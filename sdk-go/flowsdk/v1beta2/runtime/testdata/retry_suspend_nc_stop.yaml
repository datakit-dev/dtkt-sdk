apiVersion: v1beta2
kind: Flow
spec:
  name: retry_suspend_nc_stop
  description: >-
    Action's call errors with code 7; retry_strategy.suspend_when matches
    (intent: SUSPEND); NC.stop_when=true promotes to STOP per the lifecycle
    validity matrix (stop wins over suspend on the node-stop branch). Handler
    exits cleanly, action topic emits PHASE_SUCCEEDED, flow returns nil. Guards
    stop > suspend promotion at the NC stage.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.PermissionDenied
        request: "= inputs.msg.value"
      node_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= actions.echo.value"
