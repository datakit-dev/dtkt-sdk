apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_response_multi_connector
  description: >-
    Two distinct connectors (echoa, echob) each return their own typed response
    message; a single output expression concatenates fields from BOTH
    connectors' responses. Feeding one input that fans out to both actions
    yields 'from-A:from-B' on the combined output. Guards that an expression
    touching responses from MULTIPLE connectors works -- a runtime that scoped
    types per-connector would fail to decode whichever response did not match
    the active env.
  inputs:
    - id: x
      string: {}
  actions:
    - id: runA
      call:
        connection: echoa
        method: echoa.Service.Call
        request:
          payload: "= inputs.x.value"
    - id: runB
      call:
        connection: echob
        method: echob.Service.Call
        request:
          payload: "= inputs.x.value"
  outputs:
    - id: combined
      value: '= actions.runA.value.payload + ":" + actions.runB.value.payload'
