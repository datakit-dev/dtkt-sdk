apiVersion: v1beta2
kind: Flow
spec:
  name: scan_running_product
  description: >-
    Scan computing running product: starts at 1, multiplies each new value into
    the accumulator. Feeding 2, 3, 4 yields 2, 6, 24. Guards that scan accepts
    a multiplicative accumulator expression (not just additive) and emits per
    input.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: product
      value: "= inputs.x.value"
      transforms:
        - scan:
            initial: "= 1"
            accumulator: "= this.accumulator * this.value"
  outputs:
    - id: result
      value: "= vars.product.value"
