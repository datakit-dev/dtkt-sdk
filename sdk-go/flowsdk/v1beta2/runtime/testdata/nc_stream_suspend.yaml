apiVersion: v1beta2
kind: Flow
spec:
  name: nc_stream_suspend
  inputs:
    - id: msg
      string: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
      node_control:
        suspend_when: "= true"
  outputs:
    - id: result
      value: "= streams.echo.value"
