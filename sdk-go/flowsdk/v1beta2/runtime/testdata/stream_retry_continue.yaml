apiVersion: v1beta2
kind: Flow
spec:
  name: stream_retry_continue
  description: >-
    Stream calls error.StreamNotFound (code 5); retry_strategy.continue_when
    evaluates a ternary that returns the error message string when matched
    (truthy) or false otherwise. Truthy result tells retry to continue past the
    error with a substitute value. Guards the continue branch on streams:
    matched errors yield a replacement value rather than failing the iteration.
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: echo
      retry_strategy:
        continue_when: "= this.error.code == 5 ? this.error.message : false"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.StreamNotFound
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.echo.value"
