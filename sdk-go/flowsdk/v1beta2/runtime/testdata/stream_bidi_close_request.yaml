apiVersion: v1beta2
kind: Flow
spec:
  name: stream_bidi_close_request
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      close_request_when: "= inputs.x.value == 99"
      call:
        connection: echo
        method: echo.BidiEcho
  outputs:
    - id: result
      value: "= streams.echo.value"
