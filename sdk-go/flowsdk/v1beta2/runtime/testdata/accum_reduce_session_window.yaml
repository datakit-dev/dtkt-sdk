apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_session_window
  generators:
    - id: seq
      range:
        start: 1
        end: 3
        step: 1
  vars:
    - id: session
      value: "= generators.seq.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
            group_by:
              window:
                session:
                  timeout: "0.2s"
  outputs:
    - id: result
      value: "= vars.session.value"
