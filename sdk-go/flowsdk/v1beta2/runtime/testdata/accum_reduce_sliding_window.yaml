apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_sliding_window
  description: >-
    Range generator emits 1, 2, 3 instantly; a sliding window (1s length, 500ms
    slide) captures them all in one active window; reduce sums to 6 and emits
    one result. Guards that sliding-window grouping accumulates values arriving
    within the same active interval and emits when the window advances.
  generators:
    - id: seq
      range:
        start: 1
        end: 3
        step: 1
  vars:
    - id: sliding
      value: "= generators.seq.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
            group_by:
              window:
                sliding:
                  length: "1s"
                  slide: "0.5s"
  outputs:
    - id: result
      value: "= vars.sliding.value"
