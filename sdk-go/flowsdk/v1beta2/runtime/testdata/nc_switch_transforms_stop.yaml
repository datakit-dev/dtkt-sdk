apiVersion: v1beta2
kind: Flow
spec:
  name: nc_switch_transforms_stop
  description: >-
    Var with switch (no value oneof) + filter (evens) + map (*10) transform
    pipeline and node_control.stop_when=inputs.x.value>=5. Exercises the
    switchHandler.runWithTransforms code path (switch.go:152), exposing
    Gap 2: that path doesn't call checkLifecycle so NC.stop_when may never
    fire. The switch passes the input value through unchanged via default;
    transforms then filter/map. Feeding 2, 4, 5, 6, 8: filter keeps
    [2, 4, 6, 8], map yields [20, 40, 60, 80]. NC stops when input 6
    lands (first post-filter trigger). Stop-fired bound is len < 4 (full
    drain).
  inputs:
    - id: x
      int64: {}
  vars:
    - id: shaped
      switch:
        value: "= inputs.x.value"
        default: "= this.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 10"
      node_control:
        stop_when: "= inputs.x.value >= 5"
  outputs:
    - id: result
      value: "= vars.shaped.value"
