apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_continue_no_match
  description: >-
    Sibling to action_retry_continue: same continue_when guard (code==5), but
    the RPC returns Internal (code 13). The ternary returns false,
    continue_when does not fire, and the error propagates normally ('internal
    server error'). Guards that continue_when only converts errors-to-values
    when its expression yields a non-false value; otherwise the error path is
    unchanged.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        continue_when: "= this.error.code == 5 ? this.error.message : false"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.Internal
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
