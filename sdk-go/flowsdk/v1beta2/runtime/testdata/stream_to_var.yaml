apiVersion: v1beta2
kind: Flow
spec:
  name: stream_to_var
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: doubled
      value: "= streams.echo.value"
      transforms:
        - map: "= this.value * 2"
  outputs:
    - id: result
      value: "= vars.doubled.value"
