apiVersion: v1beta2
kind: Flow
spec:
  name: transform_across_nodes
  description: >-
    Transforms split across three node types: input has `map +1`; downstream
    var has `filter > 3`; output has `map *10`. Feeding 1..5: input emits [2,
    3, 4, 5, 6], var keeps [4, 5, 6], output emits [40, 50, 60]. Guards that
    transforms compose correctly across node boundaries (input -> var ->
    output).
  inputs:
    - id: x
      int64: {}
      transforms:
        - map: "= this.value + 1"
  vars:
    - id: filtered
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 3"
  outputs:
    - id: result
      value: "= vars.filtered.value"
      transforms:
        - map: "= this.value * 10"
