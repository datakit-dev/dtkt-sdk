apiVersion: v1beta2
kind: Flow
spec:
  name: transform_across_nodes_flatten_middle
  description: >-
    Input maps each x to [x, x*100]; downstream var flattens that list then
    filters >= 100. Feeding 1, 2: input lists [[1,100], [2,200]], var flatten
    -> [1, 100, 2, 200], filter -> [100, 200]. Guards a flatten-in-the-middle
    pipeline split across input and var nodes.
  inputs:
    - id: x
      int64: {}
      transforms:
        - map: "= [this.value, this.value * 100]"
  vars:
    - id: flat
      value: "= inputs.x.value"
      transforms:
        - flatten: true
        - filter: "= this.value >= 100"
  outputs:
    - id: result
      value: "= vars.flat.value"
