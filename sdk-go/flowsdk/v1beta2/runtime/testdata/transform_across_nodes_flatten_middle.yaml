apiVersion: v1beta2
kind: Flow
spec:
  name: transform_across_nodes_flatten_middle
  description: "Input(map to list) -> Var(flatten + filter) -> Output"
  inputs:
    - id: x
      int64: {}
      transforms:
        - map: "= [this.value, this.value * 100]"
  vars:
    - id: flat
      value: "= inputs.x.value"
      transforms:
        - flatten: true
        - filter: "= this.value >= 100"
  outputs:
    - id: result
      value: "= vars.flat.value"
