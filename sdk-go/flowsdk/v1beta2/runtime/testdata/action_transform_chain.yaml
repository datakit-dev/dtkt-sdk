apiVersion: v1beta2
kind: Flow
spec:
  name: action_transform_chain
  description: >-
    Action -> var with a three-step transform pipeline (filter evens, multiply
    by 5, running sum). Feeding 1, 2, 3, 4 produces evens 2, 4 -> 10, 20 ->
    running sum 10, 30. Guards that multiple transforms compose in order on the
    same var: each stage sees the prior stage's output.
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: processed
      value: "= actions.echo.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 5"
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
