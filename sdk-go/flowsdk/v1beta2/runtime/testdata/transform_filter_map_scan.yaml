apiVersion: v1beta2
kind: Flow
spec:
  name: transform_filter_map_scan
  description: "Filter evens, double, running sum via scan"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 2"
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
