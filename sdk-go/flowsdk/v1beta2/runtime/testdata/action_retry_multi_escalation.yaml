apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_multi_escalation
  description: >-
    Action declares BOTH skip_when (code-5) AND terminate_when (code-13). The
    RPC `error.NotFound` returns code 5, so skip_when fires and the item is
    silently dropped (no error). Guards that when multiple escalation rules are
    declared, the runtime evaluates each independently and applies the one that
    matches the actual error code -- here skip takes effect because the error
    is NotFound, not Internal.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        skip_when: "= this.error.code == 5"
        terminate_when: "= this.error.code == 13"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 3
      call:
        connection: echo
        method: error.NotFound
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
