apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_group_by_event_multi
  description: >-
    GroupBy key (even/odd) + event window (`when: this.value % 3 == 0`).
    Range emits 1..6. A correctly-implemented event window with per-key
    partitioning closes each key's window when the CEL gate fires on the
    incoming value, emitting one result per (key, window) pair.
    Group 1 (values 1, 2, 3): odd=1+3=4, even=2 (the value 3 triggers the
    gate, closes both per-key windows). Group 2 (values 4, 5, 6): odd=5,
    even=4+6=10 (value 6 triggers the gate). Total 4 emissions
    [4, 2, 5, 10]. Companion to accum_reduce_event_window_multi.yaml
    without per-key partitioning. Tests Gap 1's key+event-window combined
    code path. Used by TestGraph_Reduce_GroupBy_EventWindow_MultiEmission.
    Without windowing: 2 per-key emissions at EOF [9 odd, 12 even].
  generators:
    - id: seq
      range:
        start: 1
        end: 6
  vars:
    - id: grouped
      value: "= generators.seq.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
            group_by:
              key: '= this.value % 2 == 0 ? "even" : "odd"'
              window:
                event:
                  when: "= this.value % 3 == 0"
  outputs:
    - id: result
      value: "= vars.grouped.value"
