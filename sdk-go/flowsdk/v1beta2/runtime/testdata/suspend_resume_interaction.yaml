apiVersion: v1beta2
kind: Flow
spec:
  name: suspend_resume_interaction
  description: |
    Range generator -> interaction (always-prompts) -> output. With an
    auto-responder, the interaction echoes the input value back through
    the prompt, giving 1:1 sequence preservation. Used by per-node
    isolation tests for interaction handlers.
  generators:
    - id: seq
      range:
        start: 1
        end: 1000000
        rate:
          count: 100
          interval: "1s"
  interactions:
    - id: confirm
      when: "= generators.seq.value > 0"
  outputs:
    - id: result
      value: "= interactions.confirm.value"
