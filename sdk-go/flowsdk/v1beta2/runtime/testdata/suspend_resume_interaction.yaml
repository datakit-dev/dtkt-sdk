apiVersion: v1beta2
kind: Flow
spec:
  name: suspend_resume_interaction
  description: >-
    Range generator -> interaction (always-prompts) -> output. The test rig's
    auto-responder replies with an internal counter (`counter++`) that
    happens to advance 1:1 with the generator, so the output sequence is
    1, 2, 3, ... -- the value comes from the responder counter, not from
    echoing the input. Used by per-node isolation tests that verify
    SuspendNode/ResumeNode/TerminateNode on an interaction handler doesn't
    corrupt the handler's lifecycle.
  generators:
    - id: seq
      range:
        start: 1
        end: 1000000
        rate:
          count: 100
          interval: "1s"
  interactions:
    - id: confirm
      when: "= generators.seq.value > 0"
  outputs:
    - id: result
      value: "= interactions.confirm.value"
