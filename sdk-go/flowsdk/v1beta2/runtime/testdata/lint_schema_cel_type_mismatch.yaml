apiVersion: v1beta2
kind: Flow
spec:
  name: lint_schema_cel_type_mismatch
  description: >-
    Request fields with CEL expressions whose return types do not match the
    descriptor: `name = 42` (CEL int -> string field) and `count = true` (CEL
    bool -> int field). Lint must report two CodeTypeMismatch diagnostics
    citing `CEL expression returns int` and `CEL expression returns bool`.
    Guards CEL-return-type checking against the proto schema.
  connections:
    - id: myconn
      services:
        - test.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: test.Service.Do
        request:
          name: "= 42"
          count: "= true"
  outputs:
    - id: result
      value: "= actions.run.value"
