apiVersion: v1beta2
kind: Flow
spec:
  name: interaction_form_elements
  description: >-
    Interaction with one of every advanced form element: single select (with
    options sourced from an RPC method_name), multi-select, and file upload.
    Feeding 1 triggers the prompt; auto-responder replies with int64(11).
    Guards that the runtime accepts the full form-element oneof set without
    crashing and routes the response through to the output.
  inputs:
    - id: x
      int64: {}
  interactions:
    - id: form
      when: "= inputs.x.value > 0"
      inputs:
        - id: choose
          title: "Pick one"
          select:
            method_name: "test.OptionsService/List"
        - id: pickMany
          title: "Pick many"
          multi_select:
            method_name: "test.OptionsService/List"
        - id: upload
          title: "Upload a file"
          file: {}
  outputs:
    - id: result
      value: "= interactions.form.value"
