apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_multi_escalation_terminate
  description: >-
    Sibling fixture to action_retry_multi_escalation, but the RPC now returns
    Internal (code 13). skip_when does not match (5 != 13); terminate_when
    matches and the flow surfaces a TerminateError. Guards that the runtime
    checks each escalation rule independently against the actual error and
    applies whichever one matches, even when both are declared.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        skip_when: "= this.error.code == 5"
        terminate_when: "= this.error.code == 13"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 3
      call:
        connection: echo
        method: error.Internal
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
