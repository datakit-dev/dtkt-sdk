apiVersion: v1beta2
kind: Flow
spec:
  name: suspend_resume_var
  description: >-
    Range generator -> var (compute) -> output. Used by suspend/resume
    multi-cycle tests to verify the var handler preserves its input sequence
    across operator-driven suspend cycles. Output equals the input value (no
    transformation) so the sequence is exactly N.
  generators:
    - id: seq
      range:
        start: 1
        end: 1000000
        rate:
          count: 10
          interval: "1s"
  vars:
    - id: passthrough
      value: "= generators.seq.value"
  outputs:
    - id: result
      value: "= vars.passthrough.value"
