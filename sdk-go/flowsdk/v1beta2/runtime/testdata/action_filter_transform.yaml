apiVersion: v1beta2
kind: Flow
spec:
  name: action_filter_transform
  description: >-
    Action -> var with a filter transform -> output. The var keeps only values
    > 5. Feeding 1, 8, 3, 10 emits 8, 10. Guards that a filter transform on a
    downstream var correctly drops items below the threshold and forwards only
    matching values.
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: filtered
      value: "= actions.echo.value"
      transforms:
        - filter: "= this.value > 5"
  outputs:
    - id: result
      value: "= vars.filtered.value"
