apiVersion: v1beta2
kind: Flow
spec:
  name: transform_filter_then_map
  description: >-
    Var transform chain: filter evens, then map *2. Feeding 1..6: filter keeps
    [2, 4, 6], map yields [4, 8, 12]. Guards filter-then-map ordering: filter
    drops first, map only sees what survived.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 2"
  outputs:
    - id: result
      value: "= vars.processed.value"
