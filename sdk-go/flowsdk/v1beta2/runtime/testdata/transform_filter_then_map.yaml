apiVersion: v1beta2
kind: Flow
spec:
  name: transform_filter_then_map
  description: "Filter evens then double"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 2"
  outputs:
    - id: result
      value: "= vars.processed.value"
