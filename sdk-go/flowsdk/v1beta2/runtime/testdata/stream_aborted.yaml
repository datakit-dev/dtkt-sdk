apiVersion: v1beta2
kind: Flow
spec:
  name: stream_aborted
  inputs:
    - id: msg
      int64: {}
  streams:
    - id: aborted
      call:
        connection: echo
        method: error.StreamAborted
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= streams.aborted.value"
