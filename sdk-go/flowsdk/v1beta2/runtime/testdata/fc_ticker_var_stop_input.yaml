apiVersion: v1beta2
kind: Flow
spec:
  name: fc_ticker_var_stop_input
  description: >-
    Ticker drives a var whose value computes 'even'/'odd' from the tick count;
    stop_when on the VAR references both the generator's eval_count AND an
    input-provided max iterations (default 10). Three outputs collect tick
    values, even/odd labels, and a paired [count, label] list. Used by the
    flow-control test that mirrors the public ticker example: stop fires when
    tick count reaches maxIters and the flow exits cleanly. Guards that
    flow_control on a var can reference both generator and input refs in the
    same expression.
  inputs:
    - id: maxIters
      uint64:
        default: 10
  generators:
    - id: tick
      ticker:
        interval: "0.05s"
  vars:
    - id: evenOrOdd
      value: |
        = generators.tick.eval_count % 2 == 0 ? "even" : "odd"
      flow_control:
        stop_when: "= generators.tick.eval_count >= int(inputs.maxIters.value)"
  outputs:
    - id: tick
      value: "= generators.tick.value"
    - id: evenOrOdd
      value: "= vars.evenOrOdd.value"
    - id: tickAndEvenOrOdd
      value: |
        = [vars.evenOrOdd.eval_count, vars.evenOrOdd.value]
