apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_filter_then_reduce
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 1000"
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
