apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_filter_then_reduce
  description: >-
    Two-stage pipeline: filter passes only int64 values > 1000, then reduce
    sums them. Feeding 1, 2, 3 (all fail the filter) yields no output -- the
    downstream reduce sees nothing and emits nothing on EOF. Guards that a
    filtered-empty stream propagates correctly through a chained reduce instead
    of emitting the initial value alone.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 1000"
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
