apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_response_aggregation
  description: >-
    Action's call.response wraps the connector reply in a 2-element list so the
    action's published value is a list of typed message responses (rather than
    a single response). The output reads a nested field off the second element.
    Guards that downstream consumers correctly decode typed messages nested
    inside list/map structures emitted by call.response transforms -- not just
    bare top-level responses.
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: echo
        method: echo.Service.Echo
        request:
          payload: "= inputs.x.value"
        response: "= [this.response, this.response]"
  outputs:
    - id: second
      value: "= actions.run.value[1].payload"
