apiVersion: v1beta2
kind: Flow
spec:
  name: nc_action_throttle_stop
  description: >-
    Action with throttle (count=1 per 1s) and node_control.stop_when=true. The
    throttle limiter holds the second invocation for a full second; NC stop
    must wake the throttle wait so the handler exits at its next safe point
    instead of blocking for the full interval. Guards that throttle wait
    selects on stopCh.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: call
      throttle:
        count: 1
        interval: "1s"
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
      node_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= actions.call.value"
