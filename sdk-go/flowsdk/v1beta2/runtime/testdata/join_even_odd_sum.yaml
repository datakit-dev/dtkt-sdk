apiVersion: v1beta2
kind: Flow
spec:
  name: even_odd_sum
  description: >-
    Multi-pattern fixture: an int64 input fans out to evenNumbers/oddNumbers
    vars (filtered by parity); the flow then declares FIVE outputs at once --
    raw even stream, raw odd stream, paired [even, odd] tuples, running
    even-sum via scan, and final odd-sum via reduce gated on the odd var's
    stream close. Guards that the runtime supports many heterogeneous outputs
    from one upstream split without coupling their behavior.
  inputs:
    - id: number
      int64: {}
  vars:
    - id: evenNumbers
      value: "= inputs.number.value"
      transforms:
        - filter: "= this.value % 2 == 0"
    - id: oddNumbers
      value: "= inputs.number.value"
      transforms:
        - filter: "= this.value % 2 != 0"
  outputs:
    - id: evenNumbers
      value: "= vars.evenNumbers.value"
    - id: oddNumbers
      value: "= vars.oddNumbers.value"
    - id: evenOddPairs
      value: "= [vars.evenNumbers.value, vars.oddNumbers.value]"
    - id: evenSum
      value: "= vars.evenNumbers.value"
      transforms:
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
    - id: oddSum
      value: "= vars.oddNumbers.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
            group_by:
              window:
                event:
                  when: "= vars.oddNumbers.closed"
