apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_skip
  description: >-
    Action with skip_when=code-5 (NotFound). The RPC `error.NotFound` returns
    code 5; skip_when matches, the item is dropped silently, no error is
    propagated and no output is produced. Guards that skip_when consumes the
    input without surfacing an error and without emitting a downstream value.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        skip_when: "= this.error.code == 5"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.NotFound
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
