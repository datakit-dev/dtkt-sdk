apiVersion: v1beta2
kind: Flow
spec:
  name: transform_filter_rejects_all
  description: >-
    Var transform is `filter: = this.value > 100`. Feeding 1..3 yields [].
    Guards the all-rejected case: downstream sees no values, the flow still
    terminates cleanly without hang.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: none
      value: "= inputs.x.value"
      transforms:
        - filter: "= this.value > 100"
  outputs:
    - id: result
      value: "= vars.none.value"
