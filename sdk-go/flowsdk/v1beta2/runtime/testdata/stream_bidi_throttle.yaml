apiVersion: v1beta2
kind: Flow
spec:
  name: stream_bidi_throttle
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      throttle:
        count: 5
        interval: "0.5s"
      call:
        connection: echo
        method: echo.BidiEcho
        request: "= inputs.x.value"
  outputs:
    - id: result
      value: "= streams.echo.value"
