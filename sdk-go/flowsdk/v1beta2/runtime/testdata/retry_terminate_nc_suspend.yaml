apiVersion: v1beta2
kind: Flow
spec:
  name: retry_terminate_nc_suspend
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        terminate_when: "= this.error.code == 13"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.Internal
        request: "= inputs.msg.value"
      node_control:
        suspend_when: "= true"
  outputs:
    - id: result
      value: "= actions.echo.value"
