apiVersion: v1beta2
kind: Flow
spec:
  name: interaction_ticker_var_repro
  description: >-
    Reproduces a real interactive ticker flow shape: ticker -> var (with
    stop_when on the var) + interaction (title CEL pulls from generator+var) ->
    output that combines var output and interaction response then filters via
    transforms. Used to chase down a 'no such key: discard' CEL error that the
    simpler idiomatic fixture did not reproduce -- this fixture exercises the
    var/generator wiring that surfaces it.
  inputs:
    - id: maxIters
      uint64:
        default: 5
      cache: true
  generators:
    - id: tick
      ticker:
        interval: 0.05s
  vars:
    - id: evenOrOdd
      value: |
        = generators.tick.eval_count % 2 == 0 ? "even" : "odd"
      flow_control:
        stop_when: "= generators.tick.eval_count >= int(inputs.maxIters.value)"
  interactions:
    - id: confirmDiscard
      inputs:
        - id: discard
          title: |
            = string(generators.tick.value) + " is an " + vars.evenOrOdd.value + " number. Discard?"
          confirm: {}
  outputs:
    - id: evenOrOdd
      value: |
        = {
            "value": vars.evenOrOdd.value,
            "discard": interactions.confirmDiscard.value.discard.value
          }
      transforms:
        - filter: "= !this.value.discard"
        - map: "= this.value.value"
