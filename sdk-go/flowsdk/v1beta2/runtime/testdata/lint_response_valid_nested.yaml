apiVersion: v1beta2
kind: Flow
spec:
  name: lint_response_valid_nested
  description: >-
    Action `response` transform reaches into a nested submessage:
    `this.response.nested.value`. With a resolver, lint must produce zero
    diagnostics. Guards that the response-side walker descends through proto
    submessages, not just top-level fields.
  connections:
    - id: myconn
      services:
        - test.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: test.Service.Do
        request:
          name: "= inputs.x.value"
        response: "= this.response.nested.value"
  outputs:
    - id: result
      value: "= actions.run.value"
