apiVersion: v1beta2
kind: Flow
spec:
  name: action_map_transform
  description: >-
    Action -> var with a map transform -> output. The var multiplies each
    action response by 100. Feeding 3, 7 yields 300, 700. Guards that a
    per-input map transform attached to a downstream var works on
    action-produced values.
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: mapped
      value: "= actions.echo.value"
      transforms:
        - map: "= this.value * 100"
  outputs:
    - id: result
      value: "= vars.mapped.value"
