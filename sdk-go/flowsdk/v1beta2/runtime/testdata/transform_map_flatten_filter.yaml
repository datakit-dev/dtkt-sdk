apiVersion: v1beta2
kind: Flow
spec:
  name: transform_map_flatten_filter
  description: "Map to list, flatten, filter > 5"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value * 10]"
        - flatten: true
        - filter: "= this.value > 5"
  outputs:
    - id: result
      value: "= vars.processed.value"
