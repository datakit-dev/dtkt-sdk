apiVersion: v1beta2
kind: Flow
spec:
  name: transform_map_flatten_filter
  description: >-
    Var transform chain: map x -> [x, x*10], flatten, filter > 5. Feeding 1, 2:
    map -> [[1,10], [2,20]], flatten -> [1, 10, 2, 20], filter -> [10, 20]
    (drops 1, 2). Guards three-stage flatten-then-filter composition: filter
    sees post-flatten scalars.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value * 10]"
        - flatten: true
        - filter: "= this.value > 5"
  outputs:
    - id: result
      value: "= vars.processed.value"
