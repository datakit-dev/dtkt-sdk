apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_multivalue_no_window
  description: >-
    Reduce without an explicit window: accumulates int64 inputs across the
    entire stream lifetime, emits one total when the input closes. Feeding 10,
    20, 30, 40, 50 yields 150. Guards that a no-window reduce buffers all
    values until stream EOF and emits exactly one final result.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: total
      value: "= inputs.x.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.total.value"
