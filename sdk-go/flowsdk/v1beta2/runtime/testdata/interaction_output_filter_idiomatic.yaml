apiVersion: v1beta2
kind: Flow
spec:
  name: interaction_output_filter_idiomatic
  description: >-
    Idiomatic pattern for 'filter output stream by interaction response'. The
    output's main expression composes the value and the confirm-gate into a
    struct; the transform pipeline (filter on the gate, then map to extract the
    kept value) operates only on `this` -- the rule that transform expressions
    cannot reference graph nodes. This fixture is also documentation: the CEL
    access path `interactions.<id>.value.<input_id>.<binding_field>` is uniform
    because responses are wrapped as a struct keyed by input id; for a confirm
    input the bool sits at `.value`.
  inputs:
    - id: x
      int64: {}
  interactions:
    - id: confirmDiscard
      when: "= inputs.x.value > 0"
      inputs:
        - id: discard
          title: "Discard?"
          confirm: {}
  outputs:
    - id: result
      # Compose the value with the interaction's gate into a struct
      # so transforms can operate on `this` alone.
      value: |
        = {
            "value": inputs.x.value,
            "discard": interactions.confirmDiscard.value.discard.value
          }
      transforms:
        - filter: "= !this.value.discard"
        - map: "= this.value.value"
