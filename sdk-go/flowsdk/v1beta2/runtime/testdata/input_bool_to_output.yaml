apiVersion: v1beta2
kind: Flow
spec:
  name: input_bool_to_output
  description: >-
    Bool input passed straight to output. Feeding true, false, true emits the
    same sequence on the wire as BoolValues. Guards the bool input -> output
    passthrough.
  inputs:
    - id: x
      bool: {}
  outputs:
    - id: result
      value: "= inputs.x.value"
