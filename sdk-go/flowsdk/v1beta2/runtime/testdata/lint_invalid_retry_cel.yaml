apiVersion: v1beta2
kind: Flow
spec:
  name: lint_invalid_retry_cel
  description: >-
    Action's retry_strategy.skip_when expression is syntactically invalid CEL
    (`+++invalid`). Lint must report a CodeInvalidCEL diagnostic on actions.bad
    with path mentioning `retry_strategy.skip_when`. Guards that retry-strategy
    condition CEL is part of the lint surface.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: bad
      retry_strategy:
        skip_when: "= +++invalid"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.bad.value"
