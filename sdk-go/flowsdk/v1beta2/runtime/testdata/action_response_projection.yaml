apiVersion: v1beta2
kind: Flow
spec:
  name: action_response_projection
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
        response: "= this.response * 2"
  outputs:
    - id: result
      value: "= actions.echo.value"
