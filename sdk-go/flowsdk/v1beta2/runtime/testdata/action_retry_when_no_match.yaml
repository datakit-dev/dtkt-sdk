apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_when_no_match
  description: >-
    Action with `when` guard requiring code==14 (Unavailable), backoff
    configured, but the RPC `error.NotFound` returns code 5. Because the guard
    does not match, the retry strategy never activates and the first error
    propagates immediately ('resource not found'). Guards that `when` correctly
    gates the WHOLE strategy: when it returns false, backoff and other
    escalation rules are bypassed entirely.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        when: "= this.error.code == 14"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 3
      call:
        connection: echo
        method: error.NotFound
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
