apiVersion: v1beta2
kind: Flow
spec:
  name: gen_cron_value_expr
  description: >-
    Cron generator with a per-tick value expression (`this.count * 100`),
    bounded by stop_when at eval_count >= 2. Result: [100, 200]. Guards that
    the cron generator evaluates a CEL `value` expression per emission with
    `this.count` reflecting the monotonic tick number.
  generators:
    - id: cron
      cron:
        expression: "@every 1s"
        value: "= this.count * 100"
  outputs:
    - id: result
      value: "= generators.cron.value"
      flow_control:
        stop_when: "= int(generators.cron.eval_count) >= 2"
