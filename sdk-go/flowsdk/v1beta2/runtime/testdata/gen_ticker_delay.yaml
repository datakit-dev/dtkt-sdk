apiVersion: v1beta2
kind: Flow
spec:
  name: gen_ticker_delay
  description: >-
    Ticker generator with a 50ms initial `delay` plus a 50ms `interval` between
    ticks, bounded by stop_when at eval_count >= 2. The test asserts elapsed
    time is >= 80ms (delay + 1 interval) and that exactly 2 results land.
    Guards that the `delay` field is honored as an offset before the FIRST tick
    (not just the interval between subsequent ticks).
  generators:
    - id: tick
      ticker:
        delay: "0.05s"
        interval: "0.05s"
  outputs:
    - id: result
      value: "= generators.tick.value"
      flow_control:
        stop_when: "= int(generators.tick.eval_count) >= 2"
