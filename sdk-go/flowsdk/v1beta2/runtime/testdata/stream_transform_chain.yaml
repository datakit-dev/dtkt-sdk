apiVersion: v1beta2
kind: Flow
spec:
  name: stream_transform_chain
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  vars:
    - id: processed
      value: "= streams.echo.value"
      transforms:
        - filter: "= this.value % 2 == 0"
        - map: "= this.value * 10"
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
