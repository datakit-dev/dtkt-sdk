apiVersion: v1beta2
kind: Flow
spec:
  name: fc_interaction_terminate
  inputs:
    - id: x
      int64: {}
  interactions:
    - id: confirm
      when: "= inputs.x.value > 0"
      flow_control:
        terminate_when: "= true"
  outputs:
    - id: result
      value: "= interactions.confirm.value"
