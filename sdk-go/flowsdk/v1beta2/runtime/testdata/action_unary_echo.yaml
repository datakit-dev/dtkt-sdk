apiVersion: v1beta2
kind: Flow
spec:
  name: action_unary_echo
  description: >-
    Minimal action flow: int64 input is sent to an echo connector (which
    returns the request unchanged) and the response is published to an output.
    Acts as the baseline for action-node tests -- verifies that input -> action
    -> output wiring works end-to-end and that the canceller/terminate
    machinery does not interfere with the happy path.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
