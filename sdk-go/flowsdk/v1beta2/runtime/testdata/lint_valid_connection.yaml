apiVersion: v1beta2
kind: Flow
spec:
  name: lint_valid_connection
  description: >-
    Connection declared via the `services` oneof branch (lists `some.Service`);
    action references it cleanly. Lint must produce zero diagnostics. Guards
    the services-branch validation path of the connection oneof.
  connections:
    - id: myconn
      services:
        - some.Service
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: myconn
        method: some.Service.Do
        request:
          value: "= inputs.x.value"
  outputs:
    - id: result
      value: "= actions.run.value"
