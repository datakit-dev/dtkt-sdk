apiVersion: v1beta2
kind: Flow
spec:
  name: retry_suspend_fc_stop
  description: >-
    Action errors with code 7; retry_strategy.suspend_when matches (intent:
    SUSPEND); FC.stop_when=true promotes to STOP flow-wide. Flow drains
    gracefully; Execute returns nil. Guards FC's stop > suspend promotion
    across the lifecycle pipeline.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.PermissionDenied
        request: "= inputs.msg.value"
      flow_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= actions.echo.value"
