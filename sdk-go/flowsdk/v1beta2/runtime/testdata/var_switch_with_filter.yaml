apiVersion: v1beta2
kind: Flow
spec:
  name: var_switch_with_filter
  description: >-
    Var in switch form (case > 100 -> "big", default "small") plus a transform
    pipeline that filters for the literal "big". Feeding 5, 200, 50, 300:
    switch emits ["small", "big", "small", "big"], filter keeps ["big",
    "big"]. Guards that transforms run on top of switch output and that
    switch+transforms compose on a single var.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: category
      switch:
        value: "= inputs.x.value"
        case:
          - value: "= this.value > 100"
            return: '= "big"'
        default: '= "small"'
      transforms:
        - filter: '= this.value == "big"'
  outputs:
    - id: result
      value: "= vars.category.value"
