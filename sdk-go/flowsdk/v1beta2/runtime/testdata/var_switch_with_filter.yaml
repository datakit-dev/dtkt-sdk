apiVersion: v1beta2
kind: Flow
spec:
  name: var_switch_with_filter
  description: "Var with switch expression and filter keeping only 'big' values"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: category
      switch:
        value: "= inputs.x.value"
        case:
          - value: "= this.value > 100"
            return: '= "big"'
        default: '= "small"'
      transforms:
        - filter: '= this.value == "big"'
  outputs:
    - id: result
      value: "= vars.category.value"
