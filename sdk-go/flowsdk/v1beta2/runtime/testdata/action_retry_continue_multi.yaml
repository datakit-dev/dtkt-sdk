apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_continue_multi
  description: >-
    Two independent paths in one flow: a failing path (fail_input ->
    fail_action calling error.Internal with continue_when converting code-13 to
    the error message) and a healthy path (ok_input -> ok_action echoing). Each
    path produces its own output. Guards that continue_when's error-to-value
    rewrite on one branch does NOT disturb concurrent successful branches --
    the flow yields both 'internal server error' (fail) and 42 (ok).
  inputs:
    - id: fail_input
      int64: {}
    - id: ok_input
      int64: {}
  actions:
    - id: fail_action
      retry_strategy:
        continue_when: "= this.error.code == 13 ? this.error.message : false"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.Internal
        request: "= inputs.fail_input.value"
    - id: ok_action
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.ok_input.value"
  outputs:
    - id: fail_result
      value: "= actions.fail_action.value"
    - id: ok_result
      value: "= actions.ok_action.value"
