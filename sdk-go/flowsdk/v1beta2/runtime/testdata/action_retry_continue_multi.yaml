apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_continue_multi
  inputs:
    - id: fail_input
      int64: {}
    - id: ok_input
      int64: {}
  actions:
    - id: fail_action
      retry_strategy:
        continue_when: "= this.error.code == 13 ? this.error.message : false"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.Internal
        request: "= inputs.fail_input.value"
    - id: ok_action
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.ok_input.value"
  outputs:
    - id: fail_result
      value: "= actions.fail_action.value"
    - id: ok_result
      value: "= actions.ok_action.value"
