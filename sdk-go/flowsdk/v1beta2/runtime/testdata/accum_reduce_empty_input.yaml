apiVersion: v1beta2
kind: Flow
spec:
  name: reduce_empty_input
  inputs:
    - id: x
      int64: {}
  vars:
    - id: sum
      value: "= inputs.x.value"
      transforms:
        - reduce:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.sum.value"
