apiVersion: v1beta2
kind: Flow
spec:
  name: var_deep_chain_3levels
  description: >-
    Three vars chained: step1 = +1, step2 = *2, step3 = +100. Each var has a
    map transform. Feeding 5 yields 112 (((5+1)*2)+100). Guards that
    var-to-var chaining propagates per-emit values through each transform
    pipeline in declaration order.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: step1
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value + 1"
    - id: step2
      value: "= vars.step1.value"
      transforms:
        - map: "= this.value * 2"
    - id: step3
      value: "= vars.step2.value"
      transforms:
        - map: "= this.value + 100"
  outputs:
    - id: result
      value: "= vars.step3.value"
