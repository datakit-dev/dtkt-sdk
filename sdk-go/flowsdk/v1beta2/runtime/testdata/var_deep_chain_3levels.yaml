apiVersion: v1beta2
kind: Flow
spec:
  name: var_deep_chain_3levels
  description: "Three-level var chain: +1, *2, +100"
  inputs:
    - id: x
      int64: {}
  vars:
    - id: step1
      value: "= inputs.x.value"
      transforms:
        - map: "= this.value + 1"
    - id: step2
      value: "= vars.step1.value"
      transforms:
        - map: "= this.value * 2"
    - id: step3
      value: "= vars.step2.value"
      transforms:
        - map: "= this.value + 100"
  outputs:
    - id: result
      value: "= vars.step3.value"
