apiVersion: v1beta2
kind: Flow
spec:
  name: action_when
  inputs:
    - id: x
      int64: {}
  actions:
    - id: echo
      when: "= inputs.x.value > 5"
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.x.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
