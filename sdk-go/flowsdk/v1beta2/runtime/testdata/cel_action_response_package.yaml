apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_response_package
  description: "Action returns a Package; outputs read nested fields from the response"
  inputs:
    - id: x
      int64: {}
  actions:
    - id: run
      call:
        connection: pkg
        method: pkg.Fixed
        request: "= inputs.x.value"
  outputs:
    - id: name
      value: "= actions.run.value.identity.name"
    - id: version
      value: "= actions.run.value.identity.version"
    - id: type
      value: "= actions.run.value.type"
