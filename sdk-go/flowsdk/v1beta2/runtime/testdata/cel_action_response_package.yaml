apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_response_package
  description: >-
    Action calls an RPC that returns a typed Package proto; three outputs read
    `identity.name`, `identity.version`, and `type` off the response. The mock
    returns a fixed Package and the test asserts each value matches. Guards
    that CEL field access on a typed action response correctly resolves nested
    message fields and enum scalars in one flow.
  inputs:
    - id: x
      int64: {}
  actions:
    - id: run
      call:
        connection: pkg
        method: pkg.Fixed
        request: "= inputs.x.value"
  outputs:
    - id: name
      value: "= actions.run.value.identity.name"
    - id: version
      value: "= actions.run.value.identity.version"
    - id: type
      value: "= actions.run.value.type"
