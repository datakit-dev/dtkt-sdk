apiVersion: v1beta2
kind: Flow
spec:
  name: nc_action_stop
  description: >-
    Action echoes its input; node_control.stop_when=true fires after the first
    publish, halting the action handler gracefully. Feeding 42, 99: results
    length is 1 or 2 (the second may surface depending on
    select-randomization), values in input order. Flow returns nil because NC
    scopes to the node. Guards that node_control on an action stops handler
    intake at its next safe point.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: call
      call:
        connection: echo
        method: echo.Echo
        request: "= inputs.msg.value"
      node_control:
        stop_when: "= true"
  outputs:
    - id: result
      value: "= actions.call.value"
