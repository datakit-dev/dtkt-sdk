apiVersion: v1beta2
kind: Flow
spec:
  name: transform_context_cancel
  description: "Ticker feeding a var with multi-step transform pipeline for context cancel test"
  generators:
    - id: tick
      ticker:
        interval: "0.01s"
  vars:
    - id: doubled
      value: "= generators.tick.value"
      transforms:
        - map: "= this.value * 2"
        - filter: "= this.value > 0"
  outputs:
    - id: result
      value: "= vars.doubled.value"
