apiVersion: v1beta2
kind: Flow
spec:
  name: cel_stream_namespace
  description: >-
    Server stream `pkg.Stream` yields a sequence of typed Package messages; two
    outputs read `identity.name` and `identity.version` once per emitted
    element. The mock yields three Packages (alpha/beta/gamma); each output
    collects all three values. Guards that CEL access on streams.<id>.value
    works per-emission and that nested message-field access works for streaming
    results just as it does for unary.
  inputs:
    - id: trigger
      int64: {}
  streams:
    - id: pkgs
      call:
        connection: pkg
        method: pkg.Stream
        request: "= inputs.trigger.value"
  outputs:
    - id: name
      value: "= streams.pkgs.value.identity.name"
    - id: version
      value: "= streams.pkgs.value.identity.version"
