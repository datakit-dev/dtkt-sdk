apiVersion: v1beta2
kind: Flow
spec:
  name: cel_size_nested
  description: >-
    Input value is a struct with a `tags` list of strings. Output uses CEL
    `size()` to count the elements. Feeding {tags: ['a','b','c','d']} emits 4.
    Guards that `size()` operates correctly on a list nested inside a struct
    input value (not just on a top-level list).
  inputs:
    - id: x
      string: {}
  outputs:
    - id: result
      value: "= size(inputs.x.value.tags)"
