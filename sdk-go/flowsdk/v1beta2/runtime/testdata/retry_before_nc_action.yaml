apiVersion: v1beta2
kind: Flow
spec:
  name: retry_before_nc_action
  description: >-
    Action calls error.PermissionDenied (gRPC code 7);
    retry_strategy.suspend_when fires (matches code 7) and the iteration's
    starting intent becomes SUSPEND. NC.terminate_when=true then promotes that
    to TERMINATE (terminate > suspend in the lifecycle validity matrix). Action
    topic publishes PHASE_CANCELLED; flow returns nil (per-node scope). Guards
    that NC.terminate promotes retry.suspend instead of being shadowed by it.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.PermissionDenied
        request: "= inputs.msg.value"
      node_control:
        terminate_when: "= true"
  outputs:
    - id: result
      value: "= actions.echo.value"
