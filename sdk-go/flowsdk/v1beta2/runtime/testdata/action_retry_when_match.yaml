apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_when_match
  description: >-
    Action with `when` guard requiring code==14 (Unavailable). The RPC
    `error.UnavailableThenOK` returns code 14 once then OK; the guard matches,
    the strategy activates, backoff kicks in and the retry succeeds. Guards
    that `when` enables the retry strategy when its condition matches (the
    success-after-retry path), distinguishing it from the no-match variant
    where the same backoff would NOT have run.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        when: "= this.error.code == 14"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 3
      call:
        connection: echo
        method: error.UnavailableThenOK
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
