apiVersion: v1beta2
kind: Flow
spec:
  name: interaction_var_repro
  description: >-
    Same downstream shape as interaction_ticker_var_repro but with input-driven
    var iteration instead of a ticker. Used to bisect a multi-iteration hang to
    (ticker + interaction) vs (var-driven + interaction) topology. This variant
    passes; the ticker variant exposed the bug -- isolating the source to
    ticker-driven multi-iter interactions.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: tag
      value: |
        = inputs.x.value % 2 == 0 ? "even" : "odd"
  interactions:
    - id: confirmDiscard
      inputs:
        - id: discard
          title: |
            = string(inputs.x.value) + " is " + vars.tag.value + ". Discard?"
          confirm: {}
  outputs:
    - id: tag
      value: |
        = {
            "value": vars.tag.value,
            "discard": interactions.confirmDiscard.value.discard.value
          }
      transforms:
        - filter: "= !this.value.discard"
        - map: "= this.value.value"
