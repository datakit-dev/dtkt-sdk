apiVersion: v1beta2
kind: Flow
spec:
  name: gen_two_paths
  generators:
    - id: gen1
      range:
        start: 1
        end: 1000000
    - id: gen2
      range:
        start: 1
        end: 1000000
  outputs:
    - id: out1
      value: "= generators.gen1.value"
    - id: out2
      value: "= generators.gen2.value"
