apiVersion: v1beta2
kind: Flow
spec:
  name: lint_no_upstream
  description: Stream with no upstream dependencies (should be flagged by lint)
  inputs:
    - id: x
      int64: {}
  streams:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
  outputs:
    - id: result
      value: "= streams.echo.value"
