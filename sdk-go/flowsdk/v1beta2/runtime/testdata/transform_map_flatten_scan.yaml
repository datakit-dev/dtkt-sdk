apiVersion: v1beta2
kind: Flow
spec:
  name: transform_map_flatten_scan
  description: >-
    Var transform chain: map x -> [x, x+1], flatten, scan running sum (initial
    0). Feeding 10, 20: map -> [[10,11], [20,21]], flatten -> [10, 11, 20, 21],
    scan emits running totals [10, 21, 41, 62]. Guards scan over flattened
    sequences: accumulator advances per post-flatten scalar.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: processed
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value + 1]"
        - flatten: true
        - scan:
            initial: "= 0"
            accumulator: "= this.accumulator + this.value"
  outputs:
    - id: result
      value: "= vars.processed.value"
