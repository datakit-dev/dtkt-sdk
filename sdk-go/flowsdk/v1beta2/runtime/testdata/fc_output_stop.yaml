apiVersion: v1beta2
kind: Flow
spec:
  name: fc_output_stop
  description: >-
    Range generator 1..100 feeds an output with flow_control.stop_when on
    the output node, triggering when the generator's value reaches 5. Without
    FC.stop firing, the generator would emit 100 values and the test
    would hit testContext. With FC.stop firing, gracefulStop signals stopCh on
    the generator and the flow exits in bounded time. Guards that
    flow_control.stop_when on an output node actually fires (vs the previous
    finite-input fixture where natural drain == graceful drain).
  generators:
    - id: seq
      range:
        start: 1
        end: 100
        rate:
          count: 100
          interval: "1s"
  outputs:
    - id: result
      value: "= generators.seq.value"
      flow_control:
        stop_when: "= generators.seq.value >= 5"
