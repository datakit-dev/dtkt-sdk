apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_request_from_input
  description: "Action's request tree references CEL paths into a nested input value"
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: echo
        method: echo.Service.Echo
        request:
          name: "= inputs.x.value.user.name"
          age: "= inputs.x.value.user.age"
          city: "= inputs.x.value.user.address.city"
  outputs:
    - id: result
      value: "= actions.run.value"
