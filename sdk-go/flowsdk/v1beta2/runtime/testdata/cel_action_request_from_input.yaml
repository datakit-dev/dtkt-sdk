apiVersion: v1beta2
kind: Flow
spec:
  name: cel_action_request_from_input
  description: >-
    String input carries a nested structure (`{user: {name, age, address:
    {city}}}`). The action's request tree pulls each request field via a CEL
    path drilling into that nested input. The mock connector captures the
    request; the test asserts the populated scalar fields (name='alice',
    age=30, city='SF'). Guards that nested-path access in request leaves
    materializes a correctly-typed request proto, not flattened maps or
    stringified values.
  inputs:
    - id: x
      string: {}
  actions:
    - id: run
      call:
        connection: echo
        method: echo.Service.Echo
        request:
          name: "= inputs.x.value.user.name"
          age: "= inputs.x.value.user.age"
          city: "= inputs.x.value.user.address.city"
  outputs:
    - id: result
      value: "= actions.run.value"
