apiVersion: v1beta2
kind: Flow
spec:
  name: lint_invalid_output_cel
  description: >-
    Output value expression is syntactically invalid CEL (`@#$invalid`). Lint
    must report a CodeInvalidCEL diagnostic on outputs.bad. Guards that bad CEL
    in an output's `value` field is caught at lint time.
  outputs:
    - id: bad
      value: "= @#$invalid"
