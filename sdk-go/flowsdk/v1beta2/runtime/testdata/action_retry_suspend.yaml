apiVersion: v1beta2
kind: Flow
spec:
  name: action_retry_suspend
  description: >-
    Action with suspend_when=code-7 (PermissionDenied). The RPC fails with code
    7; suspend_when matches and the action node parks in PHASE_SUSPENDED
    instead of erroring. The test verifies (1) no further outputs are produced
    while suspended, (2) a ResumeNode unparks the handler and (with input EOF)
    the flow completes cleanly. Guards that suspend genuinely halts the handler
    rather than just publishing a phase event.
  inputs:
    - id: msg
      int64: {}
  actions:
    - id: echo
      retry_strategy:
        suspend_when: "= this.error.code == 7"
        backoff:
          initial_backoff: "0.001s"
          max_attempts: 1
      call:
        connection: echo
        method: error.PermissionDenied
        request: "= inputs.msg.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
