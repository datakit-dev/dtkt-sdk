apiVersion: v1beta2
kind: Flow
spec:
  name: suspend_resume_unary
  description: |
    Range generator -> unary action (echo) -> output. Verifies the unary
    action handler preserves its input sequence across suspend/resume.
    The mock 'echo' connection returns the input unchanged.
  generators:
    - id: seq
      range:
        start: 1
        end: 1000000
        rate:
          count: 100
          interval: "1s"
  actions:
    - id: echo
      call:
        connection: echo
        method: echo.Echo
        request: "= generators.seq.value"
  outputs:
    - id: result
      value: "= actions.echo.value"
