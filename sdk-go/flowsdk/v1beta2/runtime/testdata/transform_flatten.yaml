apiVersion: v1beta2
kind: Flow
spec:
  name: transform_flatten
  description: >-
    Var transform: map each input x into [x, x*10], then flatten the resulting
    list. Feeding 1, 2: post-map [[1,10], [2,20]], post-flatten [1, 10, 2, 20]
    (4 emits from 2 inputs). Guards flatten:true on list-producing maps -- one
    input fans out to multiple downstream emits.
  inputs:
    - id: x
      int64: {}
  vars:
    - id: expanded
      value: "= inputs.x.value"
      transforms:
        - map: "= [this.value, this.value * 10]"
        - flatten: true
  outputs:
    - id: result
      value: "= vars.expanded.value"
