syntax = "proto3";

package dtkt.catalog.v1beta2;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/catalog/v1beta2";

// Value represents a wide range of native and well-known protobuf types (except
// signed and unsigned fixed length encodings) with additional nullable semantics
// intended to provide maximum adaptability and representation for native types
// found in OLTP databases as well as OLAP data warehouses/query engines.
message Value {
  oneof kind {
    BoolValue bool_value = 1;
    BytesValue bytes_value = 2;
    DoubleValue double_value = 3;
    EnumValue enum_value = 4;
    FloatValue float_value = 5;
    Int32Value int32_value = 6;
    Int64Value int64_value = 7;
    StringValue string_value = 8;
    UInt32Value uint32_value = 9;
    UInt64Value uint64_value = 10;
    google.protobuf.Value json_value = 11;
    google.protobuf.Any object_value = 12;
    google.protobuf.Duration duration_value = 13;
    google.protobuf.Timestamp timestamp_value = 14;
    ListValue list_value = 15;
  }
}

// List of values for repeated fields.
message ListValue {
  repeated Value values = 1;
}

// Row represents a list of values with each value's type defined by a field of
// the same index in the context of a table read/write operation or a query
// input param or result operation.
message Row {
  repeated Value values = 1;
}

message DoubleValue {
  // The double value.
  double value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `float`.
message FloatValue {
  // The float value.
  float value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `int64`.
message Int64Value {
  // The int64 value.
  int64 value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `uint64`.
message UInt64Value {
  // The uint64 value.
  uint64 value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `int32`.
message Int32Value {
  // The int32 value.
  int32 value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `uint32`.
message UInt32Value {
  // The uint32 value.
  uint32 value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `bool`.
message BoolValue {
  // The bool value.
  bool value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `string`.
message StringValue {
  // The string value.
  string value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for `bytes`.
message BytesValue {
  // The bytes value.
  bytes value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}

// Nullable wrapper message for ENUM values.
message EnumValue {
  // The string representation of the ENUM value.
  string value = 1;
  // Valid is true if value is not NULL.
  bool valid = 2;
}
