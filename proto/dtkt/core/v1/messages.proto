syntax = "proto3";

package dtkt.core.v1;

import "buf/validate/validate.proto";
import "dtkt/flow/v1beta1/eval.proto";
import "dtkt/flow/v1beta1/spec.proto";
import "dtkt/protoform/v1beta1/protoform.proto";
import "dtkt/shared/v1beta1/enums.proto";
import "dtkt/shared/v1beta1/messages.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/any.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/core/v1;corev1";

// Address contains a supported network and compatible target.
message Address {
  // Network protocol (e.g., "tcp", "unix").
  string network = 1 [(buf.validate.field).required = true];

  // Target address for the network.
  string target = 2 [(buf.validate.field).required = true];
}

// Auth contains authentication information for API requests.
message Auth {
  // Authentication method used.
  enum AuthMethod {
    AUTH_METHOD_UNSPECIFIED = 0;
    AUTH_METHOD_OAUTH = 1; // OAuth 2.1 (Auth Code + PKCE)
    AUTH_METHOD_DEVICE = 2; // Device Authorization (RFC 8628)
    AUTH_METHOD_BEARER = 3; // Static bearer token (CI/CD)
  }

  // Authentication method used.
  AuthMethod method = 1 [(buf.validate.field).required = true];

  // Access token (JWT) or Personal Access Token (PAT).
  string access_token = 2 [debug_redact = true];

  // Refresh token (for token renewal).
  string refresh_token = 3 [debug_redact = true];

  // Token expiration timestamp.
  google.protobuf.Timestamp expires_at = 4;

  // TODO REMOVE?

  // Scope requests to an organization (if applicable).
  optional string org = 5 [(buf.validate.field).string.min_len = 1];

  // Scope requests to a space (if applicable).
  optional string space = 6 [(buf.validate.field).string.min_len = 1];
}

// Context provides the name and address of a control plane for client
// construction and resource tracing across network boundaries. Context is used
// to resolve resources by name and provide necessary information for
// authentication, encryption, auditing, tracing, and observability when sending
// data across network boundaries.
message Context {
  // Name of root control plane resource (e.g., "users/bob" or "organizations/acme").
  string name = 1 [(buf.validate.field).required = true];

  // Address of control plane.
  Address address = 2 [(buf.validate.field).required = true];

  // Authentication information for control plane.
  Auth auth = 3;
}

// Resource is a named reference to resource from a context with optional
// address and associated data payload. Resource is used for tracing data origin
// across network boundaries and can represent resources such as connections,
// deployments, etc. which may contain encrypted or decrypted data payloads
// related to the resource (such as data plane message payloads, config data,
// secret data, metrics data, etc.).
message Resource {
  // Context of resource for tracing data origin.
  Context context = 1 [(buf.validate.field).required = true];

  // Name of resource within context where data originated.
  string name = 2 [(buf.validate.field).required = true];

  // Address of resource (optional; may be used for direct access to resource
  // across network boundaries when available).
  Address address = 3;

  // Data payload, either encrypted or decrypted.
  // Notes:
  //  - data is not the resource itself, but a payload related to or originating
  //    from the resource. (e.g. config data, secret data, metrics data, etc.)
  //  - information about the type of data is provided by a field of this type.
  //    (e.g. Deployment cloud field indicates data originated from a cloud deployment)
  oneof data {
    option (buf.validate.oneof).required = true;
    EncryptedAny encrypted = 10 [debug_redact = true];
    google.protobuf.Any decrypted = 11 [debug_redact = true];
  }
}

// Automation is a runnable instance of a Flow with a tagged spec version and
// runtime configuration.
message Automation {
  option (google.api.resource) = {
    type: "Automation"
    singular: "automation"
    plural: "automations"
    pattern: "organizations/{organization}/automations/{automation}"
    pattern: "users/{user}/automations/{automation}"
  };

  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Name of flow resource to resolve spec.
  string flow = 3 [
    (buf.validate.field).required = true,
    (google.api.resource_reference).type = "Flow",
    (dtkt.protoform.v1beta1.field).title = "Flow",
    (dtkt.protoform.v1beta1.field).description = "Select a flow.",
    (dtkt.protoform.v1beta1.field).select.method_name = "dtkt.core.v1.FlowService.ListFlows",
    (dtkt.protoform.v1beta1.field).select.key_expr = "this.flows.map(i, i.name)",
    (dtkt.protoform.v1beta1.field).select.val_expr = "this.flows.map(i, i.name)"
  ];

  // Checksum of flow spec must match when resolving spec (concurrency control).
  string spec_etag = 4 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = INPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Executor runtime metadata of resolved Flow spec (versioned).
  FlowRuntimeMetadata runtime = 5 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Execution groups metadata of resolved Flow spec (versioned).
  FlowGroupsMetadata groups = 6 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Connections configuration as map of connection node id to connection
  // resource name and context (control plane).
  // Examples:
  // ```
  // - "storage": {
  //      "name": "users/bob/connections/localblob",
  //      "context": {
  //        "name": "users/bob",
  //        ...
  //      },
  //    }
  // ```
  map<string, FlowConnectionMetadata> connections = 7;

  // Initial inputs configuration as map of input node id to valid data of input
  // node's declared type (well-known type wrappers used for scalar values).
  // Format:
  // ```
  // - "bucketName": "my-storage-bucket"
  // - "adSettings": { "bid": 100 }
  // ```
  map<string, google.protobuf.Any> inputs = 8;

  // Execution is stopped if total time exceeds given duration.
  // Default: 0 (no timeout).
  google.protobuf.Duration timeout = 9;

  // Server-assigned batch name if created within a batch (optional).
  optional string batch = 10 [(dtkt.protoform.v1beta1.field).hidden = true];

  // Automation create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Automation update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];
}

// Flow is a versioned workflow spec with parsed graph representation.
message Flow {
  option (google.api.resource) = {
    type: "Flow"
    singular: "flow"
    plural: "flows"
    pattern: "organizations/{organization}/flows/{flow}"
    pattern: "users/{user}/flows/{flow}"
  };

  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Flow spec URI (optional).
  string spec_uri = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uri = true
  ];

  // Flow spec checksum for concurrency control.
  string spec_etag = 4 [(buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE];

  // Flow spec metadata (versioned).
  FlowSpecMetadata spec = 5 [(buf.validate.field).required = true];

  // Flow graph metadata (versioned).
  FlowGraphMetadata graph = 6 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Flow create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Flow update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Connection combines necessary components of a configured client to one of:
// - Deployment server with first-class configuration support using a DataKit SDK
// - Any reachable gRPC server with DIY configuration, one of:
//   - Custom proto file descriptors as a URI resolving to source .proto files
//   - Custom proto file descriptors using gRPC reflection (must be enabled on server)
message Connection {
  option (google.api.resource) = {
    type: "Connection"
    singular: "connection"
    plural: "connections"
    pattern: "organizations/{organization}/connections/{connection}"
    pattern: "users/{user}/connections/{connection}"
  };

  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  oneof type {
    option (buf.validate.oneof).required = true;

    // Name of a deployment resource.
    string deployment = 3 [
      (google.api.resource_reference).type = "Deployment",
      (dtkt.protoform.v1beta1.field).title = "Deployment",
      (dtkt.protoform.v1beta1.field).description = "Select a deployment.",
      (dtkt.protoform.v1beta1.field).select.method_name = "dtkt.core.v1.DeploymentService.ListDeployments",
      (dtkt.protoform.v1beta1.field).select.key_expr = "this.deployments.map(i, i.name)",
      (dtkt.protoform.v1beta1.field).select.val_expr = "this.deployments.map(i, i.name)"
    ];

    // Custom proto descriptors URI.
    string custom_protos = 4 [
      (buf.validate.field).string.uri = true,
      (dtkt.protoform.v1beta1.field).title = "Custom Proto Descriptors",
      (dtkt.protoform.v1beta1.field).description = "Custom connection to a server using a file path or URI to .proto source files.",
      (dtkt.protoform.v1beta1.field).input = {}
    ];

    // Custom using gRPC reflection.
    bool custom_grpc = 5 [
      (dtkt.protoform.v1beta1.field).title = "Custom gRPC Reflection",
      (dtkt.protoform.v1beta1.field).description = "Custom connection to a server with gRPC reflection service.",
      (dtkt.protoform.v1beta1.field).confirm = {
        approve: "Yes"
        decline: "No/Unsure (check for me)"
        default_selected: true
      }
    ];
  }

  // Address of gRPC server.
  Address address = 6;
  option (buf.validate.message).cel_expression = "(has(this.custom_protos) || has(this.custom_grpc)) ? has(this.address) : has(this.deployment)";

  oneof config {
    // Config data compatible with integration config schema.
    google.protobuf.Any decrypted_config = 7 [
      (google.api.field_behavior) = INPUT_ONLY,
      debug_redact = true
    ];
    // Encrypted config data.
    EncryptedAny encrypted_config = 8 [
      (google.api.field_behavior) = OUTPUT_ONLY,
      (dtkt.protoform.v1beta1.field).hidden = true
    ];
  }
  option (buf.validate.message).cel_expression = "has(this.deployment) ? has(this.decrypted_config) || has(this.encrypted_config) : true";

  // Hash of config data.
  string config_hash = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true,
    debug_redact = true
  ];

  // Generation of config data.
  uint64 config_gen = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true,
    debug_redact = true
  ];

  // Config source uri (optional).
  string config_uri = 13 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uri = true,
    (google.api.field_behavior) = INPUT_ONLY,
    (dtkt.protoform.v1beta1.field).description = "Config data URI (optional)",
    (dtkt.protoform.v1beta1.field).file = {}
  ];

  // Headers applied when dialing connection.
  map<string, string> headers = 14 [debug_redact = true];
  option (buf.validate.message).cel_expression = "has(this.headers) ? has(this.custom_protos) || has(this.custom_grpc) : false";

  // Connection create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Connection update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];
}

// Deployment is a running instance of an Integration with context aware build
// and runtime configuration. Deployments provide a way to run and manage software
// packages represented by Integrations in compatible runtime environments, enabling
// users to easily deploy and run their software packages in a consistent and
// traceable manner within the DataKit ecosystem.
message Deployment {
  option (google.api.resource) = {
    type: "Deployment"
    singular: "deployment"
    plural: "deployments"
    pattern: "organizations/{organization}/deployments/{deployment}"
    pattern: "users/{user}/deployments/{deployment}"
  };

  // Name of deployment resource.
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  enum State {
    STATE_UNSPECIFIED = 0;
    PENDING = 1;
    RUNNING = 2;
    STOPPING = 3;
    STOPPED = 4;
    FAILED = 5;
  }

  State state = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Bind address of deployment gRPC server.
  Address address = 4 [(buf.validate.field).required = true];

  // Env vars applied at runtime.
  map<string, string> env = 5 [debug_redact = true];

  // Port mappings applied at runtime.
  map<string, string> ports = 6;

  message Build {
    // Name of integration resource this build belongs to.
    string integration = 1 [
      (buf.validate.field).required = true,
      (google.api.resource_reference).type = "Integration"
    ];

    // Build metadata including artifact, platform, and runtime information.
    PackageBuildMetadata metadata = 2 [(buf.validate.field).required = true];
    option (buf.validate.message).cel_expression = "has(this.metadata.artifact_etag) && this.metadata.artifact_etag != ''";

    // Context of where the build was performed (optional if build performed
    // within the same control plane as deployment).
    Context context = 3;
  }

  // Build context for deployment, including reference to integration and build
  // metadata (must include artifact etag for a successful build). This enables
  // cross-control plane deployments where the integration resource is defined
  // in a different control plane than where it is deployed (e.g. integration
  // defined in shared cloud control plane and deployed to a user control plane,
  // or vice versa).
  Build build = 7 [(buf.validate.field).required = true];

  message Cloud {
    Context context = 1 [
      (buf.validate.field).required = true,
      (google.api.field_behavior) = INPUT_ONLY,
      (dtkt.protoform.v1beta1.field).hidden = true
    ];

    EncryptedAny config = 3 [
      (buf.validate.field).required = true,
      (google.api.field_behavior) = OUTPUT_ONLY,
      debug_redact = true
    ];
    option (buf.validate.message).cel_expression = "has(this.config) && this.config.type_url.endsWith('/google.protobuf.BytesValue')";
  }

  // Cloud context with encrypted config for binding deployment to DataKit Cloud
  // and only present when address's network is "cloud".
  Cloud cloud = 8;

  // Package config metadata fetched at runtime from server.
  TypeSchema config_schema = 9 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Package spec metadata fetched at runtime from server.
  PackageSpecMetadata package_spec = 10 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  message RuntimeMetadata {
    message Native {
      // PID of native process.
      int64 process_id = 1 [(buf.validate.field).required = true];
    }

    message Docker {
      // Container ID of docker container.
      string container_id = 1 [(buf.validate.field).required = true];
    }

    oneof type {
      option (buf.validate.oneof).required = true;

      Native native = 1;
      Docker docker = 2;
    }
  }

  // Runtime metadata of deployment, including runtime-specific information such as process ID or container ID.
  RuntimeMetadata runtime = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Etag for concurrency control of deployment updates (must match current etag
  // to update or delete).
  string etag = 18 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true,
    debug_redact = true
  ];

  // Deployment create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Deployment update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Integration describes a software package which uses the DataKit SDK and can
// be deployed to a runtime environment using a Deployment resource. An Integration
// can represent a software package in development with a local runtime environment
// or a released software package in a registry with a remote runtime environment.
// Integrations provide a way to manage software packages and their deployment
// lifecycle within the DataKit ecosystem, enabling users to easily deploy and
// run their software packages in compatible runtime environments.
message Integration {
  option (google.api.resource) = {
    type: "Integration"
    singular: "integration"
    plural: "integrations"
    pattern: "organizations/{organization}/integrations/{integration}"
    pattern: "users/{user}/integrations/{integration}"
  };

  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Package spec metadata.
  PackageSpecMetadata spec = 3 [(buf.validate.field).required = true];

  // Package spec checksum for concurrency control.
  string spec_etag = 4 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Package source URI (only present after successful build & update).
  optional string source_uri = 5 [(buf.validate.field).string.uri = true];

  // Package source checksum or git commit hash for concurrency control
  // (only present after successful build & update).
  optional string source_etag = 6;

  // Integration create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Integration update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// File represents runtime artifacts related to a Connection or Deployment, such
// as proto file descriptors used for dynamic client construction and reflection.
message File {
  option (google.api.resource) = {
    type: "File"
    singular: "file"
    plural: "files"
    pattern: "organizations/{organization}/connections/{connection}/files/{file}"
    pattern: "users/{user}/connections/{connection}/files/{file}"
    pattern: "organizations/{organization}/deployments/{deployment}/files/{file}"
    pattern: "users/{user}/deployments/{deployment}/files/{file}"
  };

  // File resource name.
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = IDENTIFIER,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Server-assigned unique ID (UUID).
  string uid = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY,
    (dtkt.protoform.v1beta1.field).hidden = true
  ];

  // Checksum of file contents for concurrency control.
  string etag = 3 [(buf.validate.field).required = true];

  // URI of file contents (e.g. source .proto files for proto descriptors).
  optional string uri = 4 [(buf.validate.field).string.uri = true];

  oneof type {
    option (buf.validate.oneof).required = true;

    // Proto file descriptor set.
    google.protobuf.FileDescriptorSet protos = 10;

    // Potentially support other file types in the future (e.g. OpenAPI specs, etc.)
  }

  // File create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // File update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Service message for documentation and reflection indexing.
message Service {
  option (google.api.resource) = {
    type: "Service"
    singular: "service"
    plural: "services"
    pattern: "services/{service}"
    pattern: "organizations/{organization}/connections/{connection}/services/{service}"
    pattern: "users/{user}/connections/{connection}/services/{service}"
    pattern: "organizations/{organization}/deployments/{deployment}/services/{service}"
    pattern: "users/{user}/deployments/{deployment}/services/{service}"
  };

  // Service resource name.
  string name = 1 [(buf.validate.field).required = true];

  // Server-assigned unique ID (UUID).
  string uid = 10 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Service description.
  string description = 2;

  // Service create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Service update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Method message for documentation and reflection indexing.
message Method {
  option (google.api.resource) = {
    type: "Method"
    singular: "method"
    plural: "methods"
    pattern: "methods/{method}"
    pattern: "organizations/{organization}/connections/{connection}/methods/{method}"
    pattern: "users/{user}/connections/{connection}/methods/{method}"
    pattern: "organizations/{organization}/deployments/{deployment}/methods/{method}"
    pattern: "users/{user}/deployments/{deployment}/methods/{method}"
  };

  // Method resource name.
  string name = 1 [(buf.validate.field).required = true];

  // Server-assigned unique ID (UUID).
  string uid = 10 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Method description.
  string description = 2;

  // Request message type.
  string request = 3 [(buf.validate.field).required = true];

  // Response message type.
  string response = 4 [(buf.validate.field).required = true];

  // Whether request is streaming.
  bool request_streaming = 5;

  // Whether response is streaming.
  bool response_streaming = 6;

  // Method create time.
  google.protobuf.Timestamp create_time = 20 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Method update time.
  google.protobuf.Timestamp update_time = 21 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Type message for documentation and reflection indexing.
message Type {
  option (google.api.resource) = {
    type: "Type"
    singular: "type"
