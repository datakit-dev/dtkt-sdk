syntax = "proto3";

package dtkt.lib.fivetran.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/lib/fivetran/v1;fivetranv1";

message CommonResponse {
  string code = 1;

  string message = 2;
}

message ConnectionDetails {
  string connected_by = 1 [json_name = "connected_by"];

  google.protobuf.Timestamp created_at = 2 [json_name = "created_at"];

  string daily_sync_time = 3 [json_name = "daily_sync_time"];

  string data_delay_sensitivity = 4 [json_name = "data_delay_sensitivity"];

  int64 data_delay_threshold = 5 [json_name = "data_delay_threshold"];

  google.protobuf.Timestamp failed_at = 6 [json_name = "failed_at"];

  string group_id = 7 [json_name = "group_id"];

  string hybrid_deployment_agent_id = 8 [json_name = "hybrid_deployment_agent_id"];

  string id = 9;

  string networking_method = 10 [json_name = "networking_method"];

  bool pause_after_trial = 11 [json_name = "pause_after_trial"];

  bool paused = 12;

  string private_link_id = 13 [json_name = "private_link_id"];

  string proxy_agent_id = 14 [json_name = "proxy_agent_id"];

  ConnectorSchedule schedule = 15;

  string schedule_type = 16 [json_name = "schedule_type"];

  string schema = 17;

  string service = 18;

  int64 service_version = 19 [json_name = "service_version"];

  StatusResponse status = 20;

  google.protobuf.Timestamp succeeded_at = 21 [json_name = "succeeded_at"];

  int64 sync_frequency = 22 [json_name = "sync_frequency"];
}

message ConnectorSchedule {
  string cron = 1;

  repeated string days_of_week = 2 [json_name = "days_of_week"];

  int64 interval = 3;

  string schedule_type = 4 [json_name = "schedule_type"];

  string time_of_day = 5 [json_name = "time_of_day"];
}

message StatusResponse {
  bool is_historical_sync = 1 [json_name = "is_historical_sync"];

  string setup_state = 2 [json_name = "setup_state"];

  string sync_state = 3 [json_name = "sync_state"];

  repeated CommonResponse tasks = 4;

  string update_state = 5 [json_name = "update_state"];

  repeated CommonResponse warnings = 6;
}
