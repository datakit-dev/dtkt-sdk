syntax = "proto3";

package dtkt.lib.fivetran.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/lib/fivetran/v1;fivetranv1";

message Credentials {
  string api_key = 1 [(buf.validate.field).required = true];
  string api_secret = 2 [(buf.validate.field).required = true];
  string webhook_secret = 3;
}
