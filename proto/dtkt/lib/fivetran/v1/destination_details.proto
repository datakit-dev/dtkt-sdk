syntax = "proto3";

package dtkt.lib.fivetran.v1;

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/lib/fivetran/v1;fivetranv1";

message DestinationDetails {
  bool daylight_saving_time_enabled = 1 [json_name = "daylight_saving_time_enabled"];

  string group_id = 2 [json_name = "group_id"];

  string hybrid_deployment_agent_id = 3 [json_name = "hybrid_deployment_agent_id"];

  string id = 4;

  string networking_method = 5 [json_name = "networking_method"];

  string private_link_id = 6 [json_name = "private_link_id"];

  string proxy_agent_id = 7 [json_name = "proxy_agent_id"];

  string region = 8;

  string service = 9;

  string setup_status = 10 [json_name = "setup_status"];

  string time_zone_offset = 11 [json_name = "time_zone_offset"];
}
