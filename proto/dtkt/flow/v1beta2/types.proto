syntax = "proto3";

package dtkt.flow.v1beta2;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/datakit-dev/dtkt-sdk/sdk-go/proto/dtkt/flow/v1beta2;flowv1beta2";

// Bool is a scalar boolean type for flow inputs.
message Bool {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional bool default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Bytes is a scalar byte array type for flow inputs.
message Bytes {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional bytes default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Double is a 64-bit floating-point type for flow inputs.
message Double {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional double default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Float is a 32-bit floating-point type for flow inputs.
message Float {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional float default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Int64 is a signed 64-bit integer type for flow inputs.
message Int64 {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional int64 default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Uint64 is an unsigned 64-bit integer type for flow inputs.
message Uint64 {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional uint64 default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Int32 is a signed 32-bit integer type for flow inputs.
message Int32 {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional int32 default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// Uint32 is an unsigned 32-bit integer type for flow inputs.
message Uint32 {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional uint32 default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// String is a UTF-8 string type for flow inputs.
message String {
  // Fallback value when the input is requested but not provided within the throttle window.
  optional string default = 1;
  // Whether the value can be explicitly null.
  bool nullable = 2;
}

// List is an ordered collection type for flow inputs.
message List {
  // Type name of list elements (e.g. "string", "int64", or a message type name).
  string items = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // Whether the list value can be explicitly null.
  bool nullable = 2;

  // Fallback value when the input is requested but not provided within the throttle window.
  google.protobuf.ListValue default = 3;
}

// Map is a key-value collection type for flow inputs.
message Map {
  // Primitive key type. Must be one of: bool, int32, int64, uint32, uint64, string.
  // Defaults to "string" if unset.
  string key = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.in = "bool",
    (buf.validate.field).string.in = "int32",
    (buf.validate.field).string.in = "int64",
    (buf.validate.field).string.in = "uint32",
    (buf.validate.field).string.in = "uint64",
    (buf.validate.field).string.in = "string"
  ];

  // Type name of map values (e.g. "string", "int64", or a message type name).
  string value = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // Whether the map value can be explicitly null.
  bool nullable = 3;

  // Fallback value when the input is requested but not provided within the throttle window.
  google.protobuf.Struct default = 4;
}

// Message is a protobuf message type reference for flow inputs.
message Message {
  // Fully-qualified protobuf message type name (e.g. "google.protobuf.Struct").
  string type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[a-zA-Z][a-zA-Z0-9_.]+$"
  ];

  // Whether the message value can be explicitly null.
  bool nullable = 2;

  // Fallback value when the input is requested but not provided within the throttle window.
  google.protobuf.Struct default = 3;
}
